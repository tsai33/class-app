<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級專屬入口網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        iframe { border: none; }
    </style>
</head>
<body class="bg-orange-50 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <nav class="bg-white shadow-xl w-full md:w-20 md:hover:w-56 transition-[width] duration-300 ease-in-out overflow-hidden group flex-shrink-0 flex flex-row md:flex-col p-3 md:py-5 md:px-3 gap-2 md:gap-4 z-30 overflow-x-auto md:overflow-visible border-b md:border-b-0 md:border-r border-gray-200">
        
        <div class="hidden md:flex flex-col items-center mb-4 border-b-2 border-orange-100 pb-4 pt-2">
            <span class="text-4xl group-hover:text-5xl transition-all duration-300 drop-shadow-sm shrink-0">👨‍🏫</span>
            <h2 class="text-lg font-black text-gray-800 mt-2 tracking-wider opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap">班級管理系統</h2>
        </div>
        
        <button onclick="switchAppTab('main')" id="nav-tab-main" class="flex-1 md:flex-none w-full px-3 py-3 md:py-4 rounded-xl font-black text-white bg-orange-500 shadow-md transition-all transform active:scale-95 text-sm md:text-base flex items-center justify-center md:justify-start gap-3 border border-orange-500 overflow-hidden">
            <span class="text-xl md:text-2xl min-w-[28px] text-center shrink-0">🍉</span> 
            <span class="whitespace-nowrap opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300">班級大作戰</span>
        </button>

        <button onclick="switchAppTab('tool')" id="nav-tab-tool" class="flex-1 md:flex-none w-full px-3 py-3 md:py-4 rounded-xl font-bold text-gray-500 bg-gray-50 hover:bg-gray-200 transition-all transform active:scale-95 text-sm md:text-base flex items-center justify-center md:justify-start gap-3 border border-gray-100 overflow-hidden">
            <span class="text-xl md:text-2xl min-w-[28px] text-center shrink-0">🌟</span> 
            <span class="whitespace-nowrap opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300">餐桶分配</span>
        </button>

        <button onclick="switchAppTab('tool2')" id="nav-tab-tool2" class="flex-1 md:flex-none w-full px-3 py-3 md:py-4 rounded-xl font-bold text-gray-500 bg-gray-50 hover:bg-gray-200 transition-all transform active:scale-95 text-sm md:text-base flex items-center justify-center md:justify-start gap-3 border border-gray-100 overflow-hidden">
            <span class="text-xl md:text-2xl min-w-[28px] text-center shrink-0">📝</span> 
            <span class="whitespace-nowrap opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300">學生檢核表</span>
        </button>

        <div class="hidden md:block flex-1"></div>

        <button onclick="openSettingsModal()" class="flex-1 md:flex-none w-full px-3 py-3 md:py-4 rounded-xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-300 transition-all transform active:scale-95 text-sm md:text-base flex items-center justify-center md:justify-start gap-3 border border-gray-200 overflow-hidden md:mt-auto">
            <span class="text-xl md:text-2xl min-w-[28px] text-center shrink-0">⚙️</span> 
            <span class="whitespace-nowrap opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300">系統設定</span>
        </button>
    </nav>

    <div class="flex-1 h-full overflow-y-auto relative w-full bg-orange-50 hide-scrollbar">
        
        <div id="app-main" class="block p-4 md:p-6 lg:p-8 w-full animate-[fadeIn_0.5s_ease-in-out]">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-3xl shadow-lg p-4 md:p-6 mb-8 flex flex-col lg:flex-row justify-between items-center border-l-8 border-orange-400 gap-4">
                    <div class="text-center lg:text-left w-full lg:w-auto">
                        <h1 class="text-2xl md:text-3xl font-black text-orange-700 mb-1">🍉 班級大作戰</h1>
                        <p class="text-sm md:text-base text-gray-600 font-medium" id="today-point-info">讀取中...</p>
                    </div>
                    
                    <div class="grid grid-cols-2 md:flex md:flex-wrap items-stretch gap-2 md:gap-3 w-full lg:w-auto justify-center lg:justify-end">
                        
                        <button onclick="openCountdownSettings()" class="col-span-2 md:col-auto bg-white px-3 py-2 md:px-4 md:py-3 rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:bg-rose-50 hover:border-rose-200 transition-all flex flex-wrap items-center justify-center gap-x-2 gap-y-1 text-center min-w-[120px]">
                            <span id="display-event-name" class="text-gray-600 text-sm md:text-base font-bold whitespace-nowrap">距離 目標</span>
                            <div class="flex items-baseline gap-1 whitespace-nowrap">
                                <span id="display-countdown-days" class="text-3xl md:text-4xl font-black text-rose-500 drop-shadow-sm">--</span>
                                <span class="text-gray-500 text-xs md:text-sm font-bold">天</span>
                            </div>
                        </button>

                        <button onclick="openInfoModal('announcement')" class="bg-blue-100 text-blue-700 font-bold px-2 py-3 md:px-3 rounded-xl hover:bg-blue-200 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-1"><span class="text-lg md:text-xl">📢</span> <span class="text-sm md:text-base whitespace-nowrap">公告</span></button>
                        <button onclick="openInfoModal('homework')" class="bg-green-100 text-green-700 font-bold px-2 py-3 md:px-3 rounded-xl hover:bg-green-200 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-1"><span class="text-lg md:text-xl">📖</span> <span class="text-sm md:text-base whitespace-nowrap">聯絡簿</span></button>
                        <button onclick="openInfoModal('tracking')" class="bg-purple-100 text-purple-700 font-bold px-2 py-3 md:px-3 rounded-xl hover:bg-purple-200 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-1"><span class="text-lg md:text-xl">✅</span> <span class="text-sm md:text-base whitespace-nowrap">作業追蹤</span></button>
                        <button id="btn-random-draw" onclick="randomDraw()" class="bg-yellow-400 text-yellow-950 font-extrabold px-2 py-3 md:px-4 rounded-xl hover:bg-yellow-500 active:scale-95 transition-all shadow-md flex items-center justify-center gap-1"><span class="text-xl">🎲</span> <span class="whitespace-nowrap">抽籤</span></button>
                    </div>
                </div>
                <div id="student-grid" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-4 md:gap-5"></div>
            </div>
        </div>

        <div id="app-tool" class="hidden h-full w-full bg-white flex-col animate-[fadeIn_0.5s_ease-in-out]">
            <iframe src="https://tsai33.github.io/supreme-parakeet/" class="w-full h-full flex-1 border-none"></iframe>
        </div>

        <div id="app-tool2" class="hidden h-full w-full bg-white flex-col animate-[fadeIn_0.5s_ease-in-out]">
            <iframe src="https://tsai33.github.io/studentchecklist/" class="w-full h-full flex-1 border-none"></iframe>
        </div>

    </div>

    <div id="info-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-2 md:p-4">
        <div class="bg-white p-4 md:p-6 rounded-3xl shadow-2xl w-full max-w-[95vw] xl:max-w-[90vw] relative transform transition-all border border-gray-100 max-h-[95vh] flex flex-col">
            <button onclick="closeInfoModal()" class="absolute top-2 right-4 text-gray-400 hover:text-red-500 text-4xl font-light z-40">&times;</button>
            
            <div id="info-content-announcement" class="hidden flex-1 overflow-y-auto hide-scrollbar mt-2 max-w-5xl mx-auto w-full">
                <div class="flex justify-between items-center mb-4 pr-8">
                    <h2 class="text-2xl font-black text-blue-700 flex items-center gap-2">📢 班級公告牆</h2>
                    <button onclick="showAddAnnouncement()" class="text-sm bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-bold transition-colors shadow-sm">➕ 新增公告</button>
                </div>
                
                <div id="announcement-editor-area" class="hidden mb-5 bg-blue-50 p-5 rounded-xl border-2 border-blue-200 shadow-inner">
                    <div class="font-bold text-blue-800 mb-2 flex items-center gap-2">
                        <span class="text-lg">🗓️ 顯示/過期日期：</span>
                        <input type="date" id="announcement-date-input" class="border-2 border-blue-200 rounded-lg p-1.5 focus:outline-none focus:border-blue-400 bg-white text-blue-900 cursor-pointer shadow-sm text-base font-bold">
                        <span class="text-xs text-blue-500 hidden md:inline ml-2">(超過此日期系統將自動隱藏刪除)</span>
                    </div>
                    <textarea id="announcement-textarea" placeholder="請輸入公告內容..." class="w-full h-32 border border-blue-200 rounded-lg p-4 mt-2 mb-4 focus:outline-none focus:border-blue-400 bg-white leading-relaxed text-lg"></textarea>
                    <div class="flex gap-2">
                        <button onclick="saveAnnouncement()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-sm text-lg">💾 儲存發布</button>
                        <button onclick="hideAddAnnouncement()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400 text-lg">取消</button>
                    </div>
                </div>
                <div id="announcement-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-4"></div>
            </div>

            <div id="info-content-homework" class="hidden flex-1 overflow-y-auto hide-scrollbar flex-col mt-2 max-w-5xl mx-auto w-full">
                <div class="flex justify-between items-center mb-4 pr-8">
                    <h2 class="text-2xl font-black text-green-700 flex items-center gap-2">📖 聯絡簿紀錄</h2>
                    <button onclick="showAddContactBook()" class="text-sm bg-green-100 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-200 font-bold transition-colors shadow-sm">➕ 新增紀錄</button>
                </div>
                <div id="contact-book-editor" class="hidden mb-5 bg-green-50 p-4 rounded-xl border-2 border-green-200 shadow-inner">
                    <div class="font-bold text-green-800 mb-2 flex items-center gap-2">
                        <span class="text-lg">🗓️ 日期：</span>
                        <input type="date" id="contact-book-date-input" class="border-2 border-green-200 rounded-lg p-1.5 focus:outline-none focus:border-green-400 bg-white text-green-900 cursor-pointer shadow-sm text-base font-bold">
                    </div>
                    <textarea id="contact-book-textarea" placeholder="國語：甲本 P.1~P.3&#10;數學：習作 P.5&#10;(每一行都會自動變成作業追蹤項目喔！)" class="w-full h-40 border border-green-200 rounded-lg p-4 mt-2 mb-4 focus:outline-none focus:border-green-400 bg-white leading-relaxed text-lg"></textarea>
                    <div class="flex gap-2">
                        <button onclick="saveContactBook()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow-sm text-lg">發布</button>
                        <button onclick="hideAddContactBook()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400 text-lg">取消</button>
                    </div>
                </div>
                <div id="contact-book-list" class="space-y-4 pb-4"></div>
            </div>
            
            <div id="info-content-tracking" class="hidden flex-col h-full mt-2 w-full">
                <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-4 gap-3 pr-8 shrink-0">
                    <h2 class="text-2xl font-black text-purple-700 flex items-center gap-2">✅ 作業追蹤</h2>
                    <select id="tracking-date-select" onchange="renderTracking()" class="w-full md:w-64 border-2 border-purple-200 bg-purple-50 text-purple-800 rounded-xl p-2 font-bold focus:outline-none focus:border-purple-400 cursor-pointer text-base md:text-lg"></select>
                </div>
                <div id="tracking-tables-container" class="flex-1 overflow-y-auto overflow-x-hidden hide-scrollbar pb-6"></div>
            </div>
        </div>
    </div>

    <div id="enlarge-modal" class="fixed inset-0 z-[60] hidden flex-col transition-colors duration-300">
        <div id="enlarge-header" class="flex justify-between items-center p-4 md:p-6 text-white shadow-lg">
            <h2 id="enlarge-title" class="text-4xl md:text-6xl lg:text-7xl font-black tracking-wider drop-shadow-md">標題</h2>
            <button onclick="closeEnlargeModal()" class="text-white hover:opacity-75 text-5xl md:text-7xl font-light leading-none px-4">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 md:p-12 lg:p-16 flex justify-center items-start">
            <div id="enlarge-box" class="w-full max-w-[95%] lg:max-w-6xl bg-white p-8 md:p-16 lg:p-20 rounded-[2rem] shadow-2xl border-4 mt-2 md:mt-8">
                <div id="enlarge-content" class="text-5xl md:text-7xl lg:text-[80px] text-gray-900 whitespace-pre-wrap leading-snug md:leading-tight font-black tracking-wide"></div>
            </div>
        </div>
    </div>

    <div id="countdown-setting-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-5 md:p-7 rounded-3xl shadow-2xl w-full max-w-sm relative transform transition-all border border-gray-100 flex flex-col">
            <button onclick="closeCountdownSettings()" class="absolute top-2 right-4 text-gray-400 hover:text-red-500 text-4xl font-light z-10">&times;</button>
            <h2 class="text-2xl font-black text-rose-700 mb-5 flex items-center gap-2">⏳ 倒數設定</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-1 text-sm">目標名稱 (例如：畢業、期末考)</label>
                    <input type="text" id="input-event-name" placeholder="請輸入目標名稱" class="w-full border-2 border-rose-200 rounded-xl p-2.5 focus:outline-none focus:border-rose-400 font-bold bg-rose-50 text-rose-900">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1 text-sm">目標日期</label>
                    <input type="date" id="input-event-date" class="w-full border-2 border-rose-200 rounded-xl p-2.5 focus:outline-none focus:border-rose-400 font-bold bg-rose-50 text-rose-900 cursor-pointer">
                </div>
                <button onclick="saveCountdownSettings()" class="w-full bg-rose-500 text-white px-4 py-3 rounded-xl font-bold shadow-sm hover:bg-rose-600 mt-2 text-lg transition-colors">💾 儲存設定</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-5 md:p-7 rounded-3xl shadow-2xl w-full max-w-4xl relative transform transition-all border border-gray-100 flex flex-col max-h-[90vh]">
            <button onclick="closeSettingsModal()" class="absolute top-2 right-4 text-gray-400 hover:text-red-500 text-5xl font-light leading-none z-10">&times;</button>
            <h2 class="text-2xl md:text-3xl font-black text-gray-800 mb-4 flex items-center gap-2 shrink-0">⚙️ 系統設定面板</h2>
            
            <div class="flex-1 overflow-y-auto hide-scrollbar flex flex-col md:flex-row gap-6 pb-2">
                <div class="flex-1 bg-orange-50 p-4 rounded-2xl border-2 border-orange-100 shadow-inner flex flex-col">
                    <h3 class="font-bold text-orange-800 mb-2 flex items-center gap-2">👨‍🎓 學生名單設定</h3>
                    <p class="text-xs text-gray-500 mb-2">請直接在此編輯名單，一行一個名字。系統會自動依照行數建立學生卡片與座號。</p>
                    <textarea id="settings-students-input" class="w-full flex-1 border border-orange-200 rounded-xl p-3 focus:outline-none focus:border-orange-400 bg-white font-medium leading-relaxed min-h-[200px]" placeholder="例如：&#10;王小明&#10;陳小華&#10;林小美..."></textarea>
                </div>
                
                <div class="flex-1 bg-green-50 p-4 rounded-2xl border-2 border-green-100 shadow-inner flex flex-col">
                    <h3 class="font-bold text-green-800 mb-2 flex items-center gap-2">🎁 兌換獎勵設定</h3>
                    <p class="text-xs text-gray-500 mb-2">格式請輸入：<b class="text-green-700">獎品名稱, 點數</b> (請用半形或全形逗號隔開)，一行一個獎品。</p>
                    <textarea id="settings-rewards-input" class="w-full flex-1 border border-green-200 rounded-xl p-3 focus:outline-none focus:border-green-400 bg-white font-medium leading-relaxed min-h-[200px]" placeholder="例如：&#10;國語生字少一格, 100&#10;免當值日生一次, 150&#10;免午休一次, 200..."></textarea>
                </div>
            </div>
            
            <div class="mt-4 shrink-0 border-t pt-4">
                <button onclick="saveSystemSettings()" class="w-full bg-gray-800 text-white px-4 py-4 rounded-xl font-bold shadow-md hover:bg-gray-900 text-lg transition-colors flex items-center justify-center gap-2">💾 儲存並套用所有設定</button>
            </div>
        </div>
    </div>

    <div id="action-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-5 md:p-7 rounded-3xl shadow-2xl w-full max-w-md relative transform transition-all border border-gray-100 flex flex-col max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-2 right-4 text-gray-400 hover:text-red-500 text-5xl font-light leading-none z-10">&times;</button>
            
            <div class="text-center mb-5 shrink-0 relative">
                <div class="relative w-24 h-24 md:w-32 md:h-32 mx-auto mb-2">
                    <div id="modal-avatar" class="w-full h-full rounded-full bg-orange-50 border-4 border-white shadow-md flex items-center justify-center text-5xl md:text-6xl select-none overflow-hidden"></div>
                    <label for="avatar-upload" class="absolute bottom-0 right-0 bg-gray-800 text-white p-2 rounded-full cursor-pointer hover:bg-gray-700 shadow-md transition-transform hover:scale-110 flex items-center justify-center text-sm md:text-base">
                        📷
                    </label>
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="handleAvatarUpload(event)">
                </div>
                <h2 id="modal-name" class="text-xl md:text-2xl font-bold text-gray-800">學生姓名</h2>
                <p class="text-gray-500 text-sm md:text-base mt-1">累積: <span id="modal-points" class="text-orange-600 font-black text-xl md:text-2xl">0</span> 點</p>
            </div>
            
            <div class="flex border-b mb-4 text-xs md:text-sm overflow-x-auto whitespace-nowrap hide-scrollbar border-gray-200 shrink-0">
                <button onclick="switchTabAction('add')" id="tab-add" class="px-2 py-2 border-b-2 border-orange-500 text-orange-600 font-bold transition-colors">加扣點</button>
                <button onclick="switchTabAction('redeem')" id="tab-redeem" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">兌換獎勵</button>
                <button onclick="switchTabAction('point-history')" id="tab-point-history" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">加扣紀錄</button>
                <button onclick="switchTabAction('history')" id="tab-history" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">遲到紀錄</button>
                <button onclick="switchTabAction('redeem-history')" id="tab-redeem-history" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">兌換紀錄</button>
            </div>

            <div class="flex-1 overflow-y-auto hide-scrollbar pb-2">
                <div id="section-add" class="space-y-4">
                    <div class="flex gap-2 md:gap-3">
                        <button id="btn-punctual" onclick="quickAdd('punctual')" class="flex-1 bg-green-500 text-white py-3 md:py-4 rounded-xl font-bold md:text-lg hover:bg-green-600 active:scale-95 transition-all shadow-md flex flex-col items-center justify-center"><span>🌅 準時加點</span><span id="label-punctual" class="text-xs font-normal opacity-90">+0 點</span></button>
                        <button id="btn-late" onclick="quickAdd('late')" class="flex-1 bg-red-500 text-white py-3 md:py-4 rounded-xl font-bold md:text-lg hover:bg-red-600 active:scale-95 transition-all shadow-md flex flex-col items-center justify-center"><span>🏃 登記遲到</span><span id="label-late" class="text-xs font-normal opacity-90">-0 點</span></button>
                    </div>

                    <div class="relative flex items-center py-1"><div class="flex-grow border-t border-gray-200"></div><span class="flex-shrink-0 mx-4 text-gray-400 text-xs">手動特殊調整</span><div class="flex-grow border-t border-gray-200"></div></div>
                    
                    <div class="flex items-center gap-2">
                        <input type="number" id="custom-point-input" placeholder="正數加點，負數按 ➖" class="flex-1 border-2 border-gray-200 p-2.5 rounded-xl focus:outline-none focus:border-orange-400 text-center font-bold text-sm md:text-base bg-gray-50 shadow-inner">
                        <button onclick="submitCustomPoints()" class="bg-gray-800 text-white px-4 py-2.5 rounded-xl font-bold hover:bg-gray-900 active:scale-95 transition-all text-sm shadow-sm">確認</button>
                    </div>

                    <div class="grid grid-cols-3 gap-2 mt-2">
                        <button onclick="appendNumpad('1')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">1</button>
                        <button onclick="appendNumpad('2')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">2</button>
                        <button onclick="appendNumpad('3')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">3</button>
                        <button onclick="appendNumpad('4')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">4</button>
                        <button onclick="appendNumpad('5')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">5</button>
                        <button onclick="appendNumpad('6')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">6</button>
                        <button onclick="appendNumpad('7')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">7</button>
                        <button onclick="appendNumpad('8')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">8</button>
                        <button onclick="appendNumpad('9')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">9</button>
                        <button onclick="appendNumpad('-')" class="bg-orange-100 border-2 border-orange-200 text-orange-700 py-2 rounded-lg font-black hover:bg-orange-200 active:bg-orange-300 shadow-sm transition-colors text-lg">➖ (負號)</button>
                        <button onclick="appendNumpad('0')" class="bg-white border-2 border-gray-100 py-2 rounded-lg font-bold text-gray-700 hover:bg-orange-50 active:bg-orange-100 shadow-sm transition-colors text-lg">0</button>
                        <button onclick="appendNumpad('backspace')" class="bg-red-50 border-2 border-red-100 text-red-600 py-2 rounded-lg font-bold hover:bg-red-100 active:bg-red-200 shadow-sm transition-colors text-lg">⌫ 刪除</button>
                    </div>
                </div>

                <div id="section-redeem" class="hidden space-y-3">
                    <div id="reward-list-container" class="h-48 overflow-y-auto border-2 border-gray-200 rounded-xl p-2 space-y-2 bg-gray-50 hide-scrollbar">
                        </div>
                    <div class="mt-2 flex gap-2">
                        <input type="number" id="redeem-point-input" placeholder="扣除點數" class="flex-1 border-2 border-gray-200 p-2 rounded-xl focus:outline-none focus:border-green-400 font-bold text-center bg-gray-50 shadow-inner text-green-700">
                        <button onclick="submitRedemption()" class="bg-green-500 text-white px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-green-600">兌換</button>
                    </div>
                </div>
                
                <div id="section-point-history" class="hidden"><div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto hide-scrollbar shadow-inner"><ul id="point-history-list" class="space-y-2"></ul></div></div>
                <div id="section-history" class="hidden"><div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto hide-scrollbar shadow-inner"><ul id="late-history-list" class="space-y-2"></ul></div></div>
                <div id="section-redeem-history" class="hidden"><div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto hide-scrollbar shadow-inner"><ul id="redeem-history-list" class="space-y-2"></ul></div></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🌟 左側導覽列 切換功能
        // ==========================================
        function switchAppTab(tabName) {
            const tabs = ['main', 'tool', 'tool2'];
            const activeClass = "flex-1 md:flex-none w-full px-3 py-3 md:py-4 rounded-xl font-black text-white bg-orange-500 shadow-md transition-all transform active:scale-95 text-sm md:text-base flex items-center justify-center md:justify-start gap-3 border border-orange-500 overflow-hidden";
            const inactiveClass = "flex-1 md:flex-none w-full px-3 py-3 md:py-4 rounded-xl font-bold text-gray-500 bg-gray-50 hover:bg-gray-200 transition-all transform active:scale-95 text-sm md:text-base flex items-center justify-center md:justify-start gap-3 border border-gray-100 overflow-hidden";

            tabs.forEach(t => {
                document.getElementById(`app-${t}`).classList.add('hidden');
                document.getElementById(`app-${t}`).classList.remove('flex', 'block');
                document.getElementById(`nav-tab-${t}`).className = inactiveClass;
            });

            const activeApp = document.getElementById(`app-${tabName}`);
            activeApp.classList.remove('hidden');
            activeApp.classList.add(tabName === 'main' ? 'block' : 'flex');
            document.getElementById(`nav-tab-${tabName}`).className = activeClass;
        }

        const dailyPointsMap = { 1: 100, 2: 200, 3: 300, 4: 400, 5: 500, 6: 100, 0: 100 };
        const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        let currentTodayPoints = 0; 
        const fruits = ['🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🍇', '🍈', '🍒', '🍑', '🥭', '🍍', '🥥', '🥝', '🍅', '🥑', '🍏', '🍇', '🍊', '🍋', '🍉', '🍓', '🍑', '🍍', '🍒', '🥭', '🫐', '🥥'];

        const HW_STATUSES = ['缺交', '已交', '訂正', '完成'];
        const HW_COLORS = {
            '缺交': 'bg-red-100 text-red-700 border-red-300',
            '已交': 'bg-green-100 text-green-700 border-green-300',
            '訂正': 'bg-yellow-100 text-yellow-700 border-yellow-300',
            '完成': 'bg-blue-100 text-blue-700 border-blue-300'
        };

        // ⭐️ 動態獎勵清單
        let appRewards = JSON.parse(localStorage.getItem('classAppRewards')) || [
            { name: "國語生字少一格", cost: 100 },
            { name: "國語生字少兩格", cost: 200 },
            { name: "國語語詞少一遍", cost: 150 },
            { name: "國語語詞少兩遍", cost: 300 },
            { name: "免當值日生一次", cost: 150 },
            { name: "免午休一次", cost: 200 },
            { name: "免抬餐一次", cost: 250 },
            { name: "午休時間播放音樂", cost: 150 },
            { name: "兌換文具用品", cost: 400 },
            { name: "提早打菜+吃飯一次", cost: 250 },
            { name: "圈詞少一遍", cost: 300 }
        ];

        let appAnnouncements = [];
        try {
            let stored = localStorage.getItem('classAppAnnouncements');
            if (stored) { appAnnouncements = JSON.parse(stored); } 
            else { appAnnouncements = [{ date: getFormattedTime().split(' ')[0], content: "🌟 歡迎來到班級專屬入口網！" }]; }
        } catch(e) { appAnnouncements = []; }

        // ⭐️ 紀錄目前編輯的公告索引
        let currentEditAnnouncementIndex = -1;

        let appContactBook = JSON.parse(localStorage.getItem('classAppContactBook')) || [];
        
        // ⭐️ 新增這行：用來記錄目前正在編輯哪一天的聯絡簿
        let currentEditContactBookIndex = -1; 
        
        let currentTrackingDate = '';
        let currentTrackingTasks = [];
        
        let students = [];
        let currentSelectedStudentId = null;

        function getFruitEmoji(id) { return fruits[(id - 1) % fruits.length]; }
        function getFormattedTime() { const now = new Date(); return `${now.getFullYear()}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`; }

        function updateClock() {
            const now = new Date(); const dayOfWeek = now.getDay();
            currentTodayPoints = dailyPointsMap[dayOfWeek];
            document.getElementById('today-point-info').innerText = `✨ 今天準時可獲得 ${currentTodayPoints} 點！`;
            if(document.getElementById('label-punctual')) document.getElementById('label-punctual').innerText = `+${currentTodayPoints} 點`;
            if(document.getElementById('label-late')) document.getElementById('label-late').innerText = `-${currentTodayPoints} 點`;
        }
        setInterval(updateClock, 1000); updateClock(); 

        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbx1mardakIchiA3CCZRvJq6FmEOMQ9uGIh3Y2DXTfr-smItfTjJLJFjGwHP7oh2pxMs/exec";

        function cleanStudentNames() {
            students.forEach(s => {
                if (!s.pointHistory) s.pointHistory = [];
                if (!s.lateDates) s.lateDates = [];
                if (!s.redeemHistory) s.redeemHistory = [];
                if (!s.homework) s.homework = {}; 
            });
        }

        async function loadDataFromCloud() {
            const savedData = localStorage.getItem('classAppStudents');
            if (savedData) { 
                students = JSON.parse(savedData); 
                cleanStudentNames(); 
            } else {
                students = Array.from({ length: 27 }, (_, i) => ({ id: i + 1, name: `${i + 1}號`, points: 0, lateDates: [], redeemHistory: [], pointHistory: [], homework: {} }));
            }
            
            renderStudents();
            renderAnnouncements(); 
            renderContactBookList(); 
            renderRewardsList(); 
            
            try {
                const response = await fetch(GOOGLE_SHEET_API_URL);
                const data = await response.json();
                if (data && data.length > 0) {
                    students = data; 
                    cleanStudentNames();
                    localStorage.setItem('classAppStudents', JSON.stringify(students)); 
                }
                renderStudents(); 
            } catch (error) { console.log("雲端連線失敗，使用本地資料"); }
        }

        function saveDataToCloud() {
            localStorage.setItem('classAppStudents', JSON.stringify(students));
            fetch(GOOGLE_SHEET_API_URL, { method: "POST", body: JSON.stringify(students) }).catch(err => console.error(err));
        }

        // ==========================================
        // ⚙️ 系統設定面板邏輯
        // ==========================================
        function openSettingsModal() {
            const namesText = students.map(s => s.name).join('\n');
            document.getElementById('settings-students-input').value = namesText;
            
            const rewardsText = appRewards.map(r => `${r.name}, ${r.cost}`).join('\n');
            document.getElementById('settings-rewards-input').value = rewardsText;
            
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveSystemSettings() {
            const namesInput = document.getElementById('settings-students-input').value.trim();
            const namesList = namesInput.split('\n').map(n => n.trim()).filter(n => n !== '');
            
            if(namesList.length === 0) {
                alert("學生名單不能為空喔！"); return;
            }

            const newStudents = [];
            namesList.forEach((name, index) => {
                const id = index + 1;
                const existing = students.find(s => s.id === id);
                if (existing) {
                    existing.name = name; 
                    newStudents.push(existing);
                } else {
                    newStudents.push({ id: id, name: name, points: 0, lateDates: [], redeemHistory: [], pointHistory: [], homework: {} });
                }
            });
            students = newStudents;
            saveDataToCloud();
            renderStudents();

            const rewardsInput = document.getElementById('settings-rewards-input').value.trim();
            const rewardsListText = rewardsInput.split('\n').map(r => r.trim()).filter(r => r !== '');
            
            appRewards = rewardsListText.map(r => {
                const parts = r.split(/,|，/);
                const name = parts[0] ? parts[0].trim() : "未命名獎品";
                const cost = parts[1] ? parseInt(parts[1].trim()) : 100;
                return { name: name, cost: isNaN(cost) ? 100 : cost };
            });
            localStorage.setItem('classAppRewards', JSON.stringify(appRewards));
            renderRewardsList();

            alert("💾 設定已成功儲存並套用！");
            closeSettingsModal();
        }

        function renderRewardsList() {
            const container = document.getElementById('reward-list-container');
            container.innerHTML = '';
            
            if(appRewards.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-6 font-bold">請至「系統設定」新增獎品</div>';
                return;
            }

            appRewards.forEach((reward, index) => {
                container.innerHTML += `
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm">
                        <input type="radio" name="reward" value="${reward.name}" data-cost="${reward.cost}" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500">
                        <span class="flex-1 font-bold text-gray-700 text-sm">${index + 1}. ${reward.name} <span class="text-orange-500 font-black">(${reward.cost}點)</span></span>
                    </label>
                `;
            });
        }


        // ==========================================
        // 核心顯示邏輯
        // ==========================================
        function renderStudents() {
            const grid = document.getElementById('student-grid'); grid.innerHTML = ''; 
            students.forEach(student => {
                const warningIcon = student.lateDates.length > 0 ? `<span class="absolute top-1 left-1 md:top-2 md:left-2 bg-red-500 text-white text-xs md:text-sm font-black px-2 py-0.5 rounded-full shadow-lg z-10">${student.lateDates.length}</span>` : '';
                const card = document.createElement('div'); card.id = `student-card-${student.id}`;
                card.className = "bg-white p-2 md:p-3 rounded-2xl shadow-md cursor-pointer transform transition-all hover:-translate-y-1 flex flex-col items-center border border-gray-100 relative ring-orange-400 hover:ring-2 hover:border-orange-200";
                card.onclick = () => openModal(student.id);
                
                let avatarHTML = '';
                if (student.avatar) {
                    avatarHTML = `<img src="${student.avatar}" class="w-full h-full object-cover">`;
                } else {
                    avatarHTML = `<img src="images/${student.id}.jpg" loading="lazy" class="w-full h-full object-cover object-top scale-125" onerror="this.outerHTML='<span class=\\'text-4xl md:text-5xl\\'>${getFruitEmoji(student.id)}</span>'">`;
                }

                card.innerHTML = `${warningIcon}<div class="relative w-16 h-16 md:w-24 md:h-24 rounded-full mb-1 bg-orange-50 border-2 md:border-4 border-white shadow-inner flex items-center justify-center select-none overflow-hidden">${avatarHTML}</div><h3 class="font-bold text-gray-800 text-sm md:text-base truncate w-full text-center mt-1">${student.name}</h3><div class="mt-1 bg-orange-100 text-orange-900 px-1 py-0.5 md:py-1 rounded-lg font-black text-xs md:text-sm w-full text-center border border-orange-200 shadow-inner">${student.points}</div>`;
                grid.appendChild(card);
            });
        }

        function randomDraw() {
            if (students.length === 0) return;
            const btn = document.getElementById('btn-random-draw'); btn.disabled = true; btn.innerHTML = `<span class="text-xl">🎲</span> <span>抽籤中...</span>`;
            let times = 0; const maxTimes = 15; 
            const interval = setInterval(() => {
                students.forEach(s => document.getElementById(`student-card-${s.id}`)?.classList.remove('ring-4', 'ring-yellow-400', 'scale-110', 'z-20', 'shadow-xl'));
                const rStudent = students[Math.floor(Math.random() * students.length)];
                document.getElementById(`student-card-${rStudent.id}`)?.classList.add('ring-4', 'ring-yellow-400', 'scale-110', 'z-20', 'shadow-xl');
                times++;
                if (times >= maxTimes) {
                    clearInterval(interval); btn.disabled = false; btn.innerHTML = `<span class="text-xl">🎲</span> <span class="whitespace-nowrap">抽籤</span>`;
                    setTimeout(() => { students.forEach(s => document.getElementById(`student-card-${s.id}`)?.classList.remove('ring-4', 'ring-yellow-400', 'scale-110', 'z-20', 'shadow-xl')); openModal(rStudent.id); }, 500); 
                }
            }, 100); 
        }

        // ==========================================
        // 📢 智慧公告系統 (自動過期刪除、星期幾、編輯功能)
        // ==========================================
        function renderAnnouncements() {
            // ⭐️ 修正時間比較魔法：改用純字串比較，徹底解決時區導致「今天」被誤刪的 Bug
            const now = new Date();
            const todayStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
            
            const originalLength = appAnnouncements.length;
            appAnnouncements = appAnnouncements.filter(entry => entry.date >= todayStr);

            if (appAnnouncements.length !== originalLength) {
                localStorage.setItem('classAppAnnouncements', JSON.stringify(appAnnouncements));
            }

            const gridEl = document.getElementById('announcement-grid');
            gridEl.innerHTML = '';
            
            if (appAnnouncements.length === 0) {
                gridEl.innerHTML = `<div class="col-span-1 md:col-span-2 lg:col-span-3 text-center text-gray-400 py-10 font-bold border-2 border-dashed border-gray-200 rounded-xl text-lg">目前沒有公告喔！</div>`;
                return;
            }
            
            appAnnouncements.sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());

            appAnnouncements.forEach((entry, index) => {
                const d = new Date(entry.date);
                const dayStr = isNaN(d) ? '' : ` (${dayNames[d.getDay()]})`;

                gridEl.innerHTML += `
                    <div class="bg-white p-5 md:p-6 rounded-2xl border-2 border-blue-100 shadow-sm relative group hover:border-blue-300 transition-all flex flex-col h-full">
                        <div class="absolute top-4 right-4 flex gap-2">
                            <button onclick="editAnnouncement(${index})" class="text-blue-600 bg-blue-50 hover:text-blue-800 hover:bg-blue-100 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors border border-blue-100 shadow-sm">編輯</button>
                            <button onclick="deleteAnnouncement(${index})" class="text-gray-400 bg-gray-50 hover:text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors border border-gray-100 shadow-sm">刪除</button>
                        </div>
                        <h3 class="font-black text-blue-800 border-b-2 border-blue-50 pb-2 mb-3 text-lg md:text-xl flex items-center gap-2 pr-28 leading-snug">🗓️ ${entry.date}${dayStr}</h3>
                        <div class="text-gray-800 whitespace-pre-wrap leading-relaxed text-xl md:text-2xl font-medium flex-1 line-clamp-3">${entry.content}</div>
                    </div>
                `;
            });
        }

        function showAddAnnouncement() {
            currentEditAnnouncementIndex = -1; // -1 代表新增模式
            document.getElementById('announcement-editor-area').classList.remove('hidden');
            const today = new Date();
            document.getElementById('announcement-date-input').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            document.getElementById('announcement-textarea').value = '';
        }

        function hideAddAnnouncement() {
            document.getElementById('announcement-editor-area').classList.add('hidden');
            currentEditAnnouncementIndex = -1;
        }

        function editAnnouncement(index) {
            currentEditAnnouncementIndex = index;
            const entry = appAnnouncements[index];
            document.getElementById('announcement-editor-area').classList.remove('hidden');
            document.getElementById('announcement-date-input').value = entry.date.replace(/\//g, '-');
            document.getElementById('announcement-textarea').value = entry.content;
        }

        function saveAnnouncement() {
            const content = document.getElementById('announcement-textarea').value.trim();
            const dateVal = document.getElementById('announcement-date-input').value;
            if(!dateVal) { alert("請選擇日期！"); return; }
            if(!content) { alert("公告內容不能為空喔！"); return; }
            
            const formattedDate = dateVal.replace(/-/g, '/');
            
            if (currentEditAnnouncementIndex !== -1) {
                appAnnouncements[currentEditAnnouncementIndex] = { date: formattedDate, content: content };
                currentEditAnnouncementIndex = -1; 
            } else {
                appAnnouncements.push({ date: formattedDate, content: content });
            }
            
            appAnnouncements.sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
            localStorage.setItem('classAppAnnouncements', JSON.stringify(appAnnouncements));
            
            hideAddAnnouncement();
            renderAnnouncements();
        }

        function deleteAnnouncement(index) {
            if(confirm("確定要刪除這則公告嗎？")) {
                appAnnouncements.splice(index, 1);
                localStorage.setItem('classAppAnnouncements', JSON.stringify(appAnnouncements));
                renderAnnouncements();
            }
        }

        // ==========================================
        // 📖 聯絡簿紀錄 (加入編輯功能)
        // ==========================================
        function renderContactBookList() {
            const listEl = document.getElementById('contact-book-list'); listEl.innerHTML = '';
            if (appContactBook.length === 0) { listEl.innerHTML = `<div class="text-center text-gray-400 py-6 font-bold border-2 border-dashed border-gray-200 rounded-xl text-lg">尚無聯絡簿紀錄，點擊上方新增紀錄！</div>`; return; }
            appContactBook.forEach((entry, index) => {
                listEl.innerHTML += `
                    <div class="bg-white p-5 md:p-6 rounded-2xl border border-green-100 shadow-sm relative group">
                        <div class="absolute top-4 right-4 flex gap-2">
                            <button onclick="editContactBook(${index})" class="text-green-700 hover:text-green-900 text-sm md:text-base font-bold bg-green-100 hover:bg-green-200 px-3 py-1.5 rounded-lg transition-colors flex items-center shadow-sm">編輯</button>
                            <button onclick="openEnlargeModal('homework', ${index})" class="text-green-700 hover:text-green-900 text-sm md:text-base font-bold bg-green-100 hover:bg-green-200 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1 shadow-sm">🔍 <span class="hidden md:inline">放大</span></button>
                            <button onclick="deleteContactBook(${index})" class="text-gray-400 hover:text-red-500 text-sm md:text-base font-bold bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 transition-colors shadow-sm">刪除</button>
                        </div>
                        <h3 class="font-bold text-green-800 border-b border-green-100 pb-3 mb-4 text-xl md:text-2xl pr-40 leading-snug">🗓️ ${entry.date}</h3>
                        <div class="text-gray-800 whitespace-pre-wrap leading-relaxed text-lg md:text-xl font-medium">${entry.content}</div>
                    </div>
                `;
            });
        }

        function showAddContactBook() {
            currentEditContactBookIndex = -1; // ⭐️ -1 代表現在是「新增模式」
            document.getElementById('contact-book-editor').classList.remove('hidden');
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('contact-book-date-input').value = `${yyyy}-${mm}-${dd}`;
            document.getElementById('contact-book-textarea').value = '';
        }

        function hideAddContactBook() { 
            document.getElementById('contact-book-editor').classList.add('hidden'); 
            currentEditContactBookIndex = -1; // 清除狀態
        }

        // ⭐️ 全新功能：點擊編輯聯絡簿
        function editContactBook(index) {
            currentEditContactBookIndex = index; // 記住現在編輯的是哪一筆
            const entry = appContactBook[index];
            document.getElementById('contact-book-editor').classList.remove('hidden');
            
            // 將 "2026/03/19 (星期四)" 轉回 "2026-03-19" 給輸入框使用
            const dateOnly = entry.date.split(' ')[0].replace(/\//g, '-');
            document.getElementById('contact-book-date-input').value = dateOnly;
            document.getElementById('contact-book-textarea').value = entry.content;
        }
        
        function saveContactBook() {
            const content = document.getElementById('contact-book-textarea').value.trim();
            const dateVal = document.getElementById('contact-book-date-input').value;
            
            if(!dateVal) { alert("請選擇日期！"); return; }
            if(!content) { alert("聯絡簿內容不能為空喔！"); return; }
            
            const selectedDate = new Date(dateVal);
            const formattedDate = `${selectedDate.getFullYear()}/${(selectedDate.getMonth()+1).toString().padStart(2,'0')}/${selectedDate.getDate().toString().padStart(2,'0')} (${dayNames[selectedDate.getDay()]})`;

            // ⭐️ 判斷是新增還是編輯
            if (currentEditContactBookIndex !== -1) {
                appContactBook[currentEditContactBookIndex] = { date: formattedDate, content: content };
                currentEditContactBookIndex = -1;
            } else {
                appContactBook.unshift({ date: formattedDate, content: content });
            }

            // 存檔前確保時間由新到舊排序
            appContactBook.sort((a, b) => b.date.localeCompare(a.date));

            localStorage.setItem('classAppContactBook', JSON.stringify(appContactBook));
            hideAddContactBook(); 
            renderContactBookList();
            
            // 同步更新作業追蹤表
            if(!document.getElementById('info-content-tracking').classList.contains('hidden')){ 
                populateTrackingDates(); 
                renderTracking(); 
            }
        }

        function deleteContactBook(index) {
            if(confirm("確定要刪除這天的聯絡簿紀錄嗎？")) { 
                appContactBook.splice(index, 1); 
                localStorage.setItem('classAppContactBook', JSON.stringify(appContactBook)); 
                renderContactBookList(); 
                populateTrackingDates(); 
                renderTracking();
            }
        }

        // ==========================================
        // ✅ 作業追蹤系統 
        // ==========================================
        function populateTrackingDates() {
            const select = document.getElementById('tracking-date-select');
            select.innerHTML = '';
            if (appContactBook.length === 0) {
                select.innerHTML = '<option value="">(無聯絡簿紀錄)</option>'; return;
            }
            appContactBook.forEach((entry, i) => {
                const opt = document.createElement('option');
                opt.value = i; opt.text = `🗓️ ${entry.date}`; select.appendChild(opt);
            });
        }

        function renderTracking() {
            const select = document.getElementById('tracking-date-select');
            const container = document.getElementById('tracking-tables-container');

            if (appContactBook.length === 0 || !select.value) {
                container.innerHTML = '<div class="text-center text-gray-400 py-10 font-bold bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 text-lg">請先於「聯絡簿」新增內容，系統將自動產生追蹤表格！</div>';
                return;
            }

            const entry = appContactBook[select.value];
            currentTrackingDate = entry.date;
            currentTrackingTasks = entry.content.split('\n').map(t => t.trim()).filter(t => t !== '');

            if (currentTrackingTasks.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-10 font-bold bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 text-lg">該日聯絡簿無文字內容可追蹤！</div>';
                return;
            }

            const numColumns = 3; 
            const chunkSize = Math.ceil(students.length / numColumns);
            
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 items-start pb-2">`;

            for (let c = 0; c < numColumns; c++) {
                const chunk = students.slice(c * chunkSize, (c + 1) * chunkSize);
                if (chunk.length === 0) continue;

                html += `
                <div class="bg-white rounded-2xl border-2 border-purple-200 shadow-sm overflow-hidden flex flex-col relative isolate">
                    <div class="overflow-x-auto hide-scrollbar">
                        <table class="w-full text-center border-collapse whitespace-nowrap text-sm">
                            <thead class="bg-purple-50 text-gray-800">
                                <tr>
                                    <th class="sticky left-0 z-20 bg-purple-100 border-b-2 border-r border-purple-200 p-2 md:p-3 min-w-[50px] md:min-w-[60px]">號碼</th>
                `;

                currentTrackingTasks.forEach((task, i) => {
                    html += `
                                    <th class="border-b-2 border-purple-200 p-2 md:p-3 min-w-[100px] md:min-w-[110px]">
                                        <div class="truncate max-w-[120px] mx-auto font-black text-purple-900" title="${task}">${task}</div>
                                        <button onclick="batchSetTracking(${i}, '已交')" class="mt-1.5 text-xs bg-purple-600 text-white hover:bg-purple-700 px-2 py-1.5 rounded-lg transition-colors w-full font-bold shadow-sm">
                                            ⚡ 全班已交
                                        </button>
                                    </th>
                    `;
                });

                html += `       </tr>
                            </thead>
                            <tbody class="bg-white [&>tr:last-child>td]:border-b-0">
                `;

                chunk.forEach((student) => {
                    if (!student.homework) student.homework = {};
                    if (!student.homework[currentTrackingDate]) student.homework[currentTrackingDate] = {};

                    html += `
                                <tr class="hover:bg-orange-50 transition-colors">
                                    <td class="sticky left-0 z-10 bg-white border-r border-b border-gray-200 p-2 md:p-3 font-black text-gray-900 shadow-[1px_0_0_0_#e5e7eb]">
                                        ${student.id}
                                    </td>
                    `;

                    currentTrackingTasks.forEach((task, i) => {
                        const status = student.homework[currentTrackingDate][task] || '缺交';
                        const colorClass = HW_COLORS[status];
                        html += `
                                    <td class="p-1.5 md:p-2 border-b border-gray-200">
                                        <button onclick="cycleTrackingStatus(${student.id}, ${i}, this)" 
                                            class="w-full py-1.5 md:py-2 px-1 rounded-lg text-xs md:text-sm font-black border transition-colors select-none active:scale-95 shadow-sm ${colorClass}">
                                            ${status}
                                        </button>
                                    </td>
                        `;
                    });
                    html += `   </tr>`;
                });

                html += `       </tbody>
                        </table>
                    </div>
                </div>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        function cycleTrackingStatus(studentId, taskIndex, btnElement) {
            const task = currentTrackingTasks[taskIndex];
            const student = students.find(s => s.id === studentId);
            let currentStatus = student.homework[currentTrackingDate][task] || '缺交';
            
            let nextIndex = (HW_STATUSES.indexOf(currentStatus) + 1) % HW_STATUSES.length;
            let newStatus = HW_STATUSES[nextIndex];
            
            student.homework[currentTrackingDate][task] = newStatus;
            saveDataToCloud();
            
            const colorClass = HW_COLORS[newStatus];
            btnElement.className = `w-full py-1.5 md:py-2 px-1 rounded-lg text-xs md:text-sm font-black border transition-colors select-none active:scale-95 shadow-sm ${colorClass}`;
            btnElement.innerText = newStatus;
        }

        function batchSetTracking(taskIndex, targetStatus) {
            const task = currentTrackingTasks[taskIndex];
            if(!confirm(`確定要將【全班】的「${task.substring(0,8)}...」都設為「${targetStatus}」嗎？`)) return;
            
            students.forEach(student => {
                if (!student.homework) student.homework = {};
                if (!student.homework[currentTrackingDate]) student.homework[currentTrackingDate] = {};
                student.homework[currentTrackingDate][task] = targetStatus;
            });
            saveDataToCloud();
            renderTracking();
        }

        // ==========================================
        // --- 彈出視窗切換 ---
        // ==========================================
        function openInfoModal(type) {
            document.getElementById('info-modal').classList.remove('hidden'); 
            document.getElementById('info-content-announcement').classList.add('hidden');
            document.getElementById('info-content-homework').classList.add('hidden'); 
            document.getElementById('info-content-tracking').classList.add('hidden');
            
            document.getElementById(`info-content-${type}`).classList.remove('hidden');

            if(type === 'tracking') {
                populateTrackingDates();
                renderTracking();
            }
        }

        function closeInfoModal() {
            document.getElementById('info-modal').classList.add('hidden');
            hideAddAnnouncement();
        }

        function openEnlargeModal(type, index = null) {
            const modal = document.getElementById('enlarge-modal'); const header = document.getElementById('enlarge-header');
            const box = document.getElementById('enlarge-box'); const titleEl = document.getElementById('enlarge-title'); const contentEl = document.getElementById('enlarge-content');
            modal.className = 'fixed inset-0 z-[60] flex flex-col transition-colors duration-300';
            header.className = 'flex justify-between items-center p-4 md:p-6 text-white shadow-lg';
            
            if (type === 'homework') {
                const entry = appContactBook[index];
                modal.classList.add('bg-green-50'); header.classList.add('bg-green-700'); box.classList.add('border-green-200');
                titleEl.innerText = `🗓️ ${entry.date}`; contentEl.innerText = entry.content;
            }
        }
        function closeEnlargeModal() { document.getElementById('enlarge-modal').classList.add('hidden'); document.getElementById('enlarge-modal').classList.remove('flex'); }

        // ==========================================
        // 學生操作視窗區塊
        // ==========================================
        function openModal(studentId) {
            currentSelectedStudentId = studentId; const student = students.find(s => s.id === studentId);
            document.getElementById('modal-name').innerText = student.name; document.getElementById('modal-points').innerText = student.points;
            
            let avatarHTML = '';
            if (student.avatar) {
                avatarHTML = `<img src="${student.avatar}" class="w-full h-full object-cover">`;
            } else {
                avatarHTML = `<img src="images/${student.id}.jpg" class="w-full h-full object-cover object-top scale-125" onerror="this.outerHTML='<span class=\\'text-6xl md:text-7xl\\'>${getFruitEmoji(student.id)}</span>'">`;
            }
            document.getElementById('modal-avatar').innerHTML = avatarHTML;
            document.getElementById('avatar-upload').value = '';
            
            document.getElementById('custom-point-input').value = ''; 
            document.getElementById('redeem-point-input').value = ''; 
            document.querySelectorAll('input[name="reward"]').forEach(radio => radio.checked = false);
            
            renderHistoryList(student); renderRedeemHistoryList(student); renderPointHistoryList(student); switchTabAction('add'); 
            document.getElementById('action-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('action-modal').classList.add('hidden'); currentSelectedStudentId = null; }

        function switchTabAction(tab) {
            const sections = ['add', 'redeem', 'history', 'redeem-history', 'point-history'];
            sections.forEach(s => {
                const secEl = document.getElementById(`section-${s}`); const tabEl = document.getElementById(`tab-${s}`);
                if (s === tab) {
                    secEl.classList.remove('hidden'); tabEl.classList.add('border-b-2', 'border-orange-500', 'text-orange-600'); tabEl.classList.remove('text-gray-500');
                } else {
                    secEl.classList.add('hidden'); tabEl.classList.remove('border-b-2', 'border-orange-500', 'text-orange-600'); tabEl.classList.add('text-gray-500');
                }
            });
        }

        function autoFillPoints(radioElement) {
            const pointCost = radioElement.getAttribute('data-cost');
            document.getElementById('redeem-point-input').value = pointCost;
        }

        function renderPointHistoryList(student) {
            const listEl = document.getElementById('point-history-list'); listEl.innerHTML = '';
            if (!student.pointHistory || student.pointHistory.length === 0) { listEl.innerHTML = `<li class="text-center text-gray-400 font-bold py-6">目前無紀錄喔！</li>`; return; }
            [...student.pointHistory].reverse().forEach((recordStr) => {
                const isAdd = recordStr.includes('(+'); const icon = isAdd ? '➕' : '➖';
                const colorClass = isAdd ? 'text-green-700 border-green-200 bg-green-50' : 'text-red-700 border-red-200 bg-red-50';
                listEl.innerHTML += `<li class="flex items-start text-xs md:text-sm p-2 rounded border ${colorClass} mb-1"><span class="mr-2 mt-0.5">${icon}</span> <span>${recordStr}</span></li>`;
            });
        }

        function renderHistoryList(student) {
            const listEl = document.getElementById('late-history-list'); listEl.innerHTML = '';
            if (!student.lateDates || student.lateDates.length === 0) { listEl.innerHTML = `<li class="text-center text-green-600 font-bold py-6">✅ 目前沒有遲到紀錄！</li>`; return; }
            const reversedDates = [...student.lateDates].reverse();
            reversedDates.forEach((dateStr, index) => {
                const originalIndex = student.lateDates.length - 1 - index;
                listEl.innerHTML += `<li class="flex items-center justify-between text-xs md:text-sm p-2 bg-white rounded border border-red-100 text-red-700 mb-1"><div class="flex items-center"><span class="mr-2">🏃</span> ${dateStr}</div><button onclick="deleteLateRecord(${originalIndex})" class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold hover:bg-red-200">消除</button></li>`;
            });
        }
        function deleteLateRecord(index) {
            if(confirm("確定消除這筆遲到紀錄嗎？")) { const student = students.find(s => s.id === currentSelectedStudentId); student.lateDates.splice(index, 1); renderHistoryList(student); renderStudents(); saveDataToCloud(); }
        }

        function renderRedeemHistoryList(student) {
            const listEl = document.getElementById('redeem-history-list'); listEl.innerHTML = '';
            if (!student.redeemHistory || student.redeemHistory.length === 0) { listEl.innerHTML = `<li class="text-center text-gray-400 font-bold py-6">目前還沒有兌換過獎勵喔！</li>`; return; }
            [...student.redeemHistory].reverse().forEach((recordStr) => { listEl.innerHTML += `<li class="flex items-start text-xs md:text-sm p-2 bg-white rounded border border-blue-100 text-blue-800 mb-1"><span class="mr-2 mt-0.5">🎁</span> <span>${recordStr}</span></li>`; });
        }

        function quickAdd(type) {
            const student = students.find(s => s.id === currentSelectedStudentId); let pointsToChange = 0;
            if (type === 'punctual') { pointsToChange = currentTodayPoints; student.pointHistory.push(`[${getFormattedTime()}] 準時到校 (+${currentTodayPoints}點)`); } 
            else if (type === 'late') { if(!confirm(`確定要登記遲到並扣除 ${currentTodayPoints} 點嗎？`)) return; pointsToChange = -currentTodayPoints; student.lateDates.push(`[${getFormattedTime()}] 遲到登記`); student.pointHistory.push(`[${getFormattedTime()}] 遲到扣除 (-${currentTodayPoints}點)`); }
            updateStudentPoints(currentSelectedStudentId, pointsToChange); closeModal();
        }

        function submitCustomPoints() {
            const pts = parseInt(document.getElementById('custom-point-input').value); if (isNaN(pts)) { alert("請輸入有效的數字！"); return; }
            const student = students.find(s => s.id === currentSelectedStudentId); student.pointHistory.push(`[${getFormattedTime()}] 手動調整 (${pts >= 0 ? '+' : ''}${pts}點)`);
            updateStudentPoints(currentSelectedStudentId, pts); closeModal();
        }
        
        function appendNumpad(val) {
            const input = document.getElementById('custom-point-input');
            if (val === 'backspace') {
                input.value = input.value.toString().slice(0, -1);
            } else if (val === '-') {
                if (input.value.includes('-')) {
                    input.value = input.value.replace('-', '');
                } else {
                    input.value = '-' + input.value;
                }
            } else {
                input.value += val;
            }
        }
        
       function submitRedemption() {
            const selected = document.querySelector('input[name="reward"]:checked'); if (!selected) { alert("請先選擇兌換項目！"); return; }
            const cost = parseInt(document.getElementById('redeem-point-input').value); if (isNaN(cost) || cost <= 0) { alert("請輸入扣除點數！"); return; }
            const student = students.find(s => s.id === currentSelectedStudentId); if (student.points < cost) { alert(`點數不足！還差 ${cost - student.points} 點。`); return; }
            
            if (confirm(`確定花 ${cost} 點兌換「${selected.value}」嗎？`)) {
                const timeStr = getFormattedTime(); 
                student.redeemHistory.push(`[${timeStr}] 兌換 <b>${selected.value}</b>`); 
                student.pointHistory.push(`[${timeStr}] 兌換獎勵 (-${cost}點)`);
                updateStudentPoints(currentSelectedStudentId, -cost); 
                closeModal(); 
            }
        }

        function updateStudentPoints(studentId, pointsToChange) { const index = students.findIndex(s => s.id === studentId); if (index !== -1) { students[index].points += pointsToChange; renderStudents(); saveDataToCloud(); } }

        // ==========================================
        // 🖼️ 學生自訂頭像上傳與壓縮處理
        // ==========================================
        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 200; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

                    const student = students.find(s => s.id === currentSelectedStudentId);
                    student.avatar = dataUrl;
                    
                    saveDataToCloud(); 
                    renderStudents();  
                    openModal(currentSelectedStudentId); 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ==========================================
        // ⏳ 倒數計時器邏輯
        // ==========================================
        let countdownData = JSON.parse(localStorage.getItem('classAppCountdown')) || { name: '目標', date: '' };

        function updateCountdownDisplay() {
            const nameEl = document.getElementById('display-event-name');
            const daysEl = document.getElementById('display-countdown-days');
            
            if (!countdownData.date) {
                nameEl.innerText = '點擊設定倒數';
                daysEl.innerText = '--';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            const targetDate = new Date(countdownData.date);
            targetDate.setHours(0, 0, 0, 0);

            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > 0) {
                nameEl.innerText = `距離 ${countdownData.name}`;
                daysEl.innerText = diffDays;
            } else if (diffDays === 0) {
                nameEl.innerText = `就是今天！`;
                daysEl.innerText = '0';
            } else {
                nameEl.innerText = `${countdownData.name}已過`;
                daysEl.innerText = Math.abs(diffDays);
            }
        }

        function openCountdownSettings() {
            document.getElementById('input-event-name').value = countdownData.name !== '目標' ? countdownData.name : '';
            document.getElementById('input-event-date').value = countdownData.date;
            document.getElementById('countdown-setting-modal').classList.remove('hidden');
        }

        function closeCountdownSettings() {
            document.getElementById('countdown-setting-modal').classList.add('hidden');
        }

        function saveCountdownSettings() {
            const name = document.getElementById('input-event-name').value.trim();
            const date = document.getElementById('input-event-date').value;
            
            if (!name || !date) {
                alert('名稱與日期都不能為空喔！');
                return;
            }

            countdownData = { name, date };
            localStorage.setItem('classAppCountdown', JSON.stringify(countdownData));
            updateCountdownDisplay();
            closeCountdownSettings();
        }

        // 初始載入
        window.onload = () => {
            loadDataFromCloud();
            updateCountdownDisplay();
        };
    </script>
</body>
</html>
