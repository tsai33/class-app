<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>準時上學大作戰</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('APP 背景小幫手註冊成功！'))
                    .catch(err => console.log('註冊失敗：', err));
            });
        }
    </script>
    <style>
        body { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-blue-50 p-8 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 flex flex-col md:flex-row justify-between items-center border-l-8 border-blue-500">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-3xl font-black text-blue-700 mb-1">⏰ 準時上學大作戰</h1>
                <p class="text-gray-600 font-medium" id="today-point-info">讀取中...</p>
            </div>
            <div class="bg-blue-50 px-6 py-3 rounded-xl text-center border border-blue-100">
                <div id="clock-date" class="text-sm font-bold text-gray-500 mb-1">YYYY年MM月DD日 星期X</div>
                <div id="clock-time" class="text-3xl font-black text-blue-600 tracking-wider">00:00:00</div>
            </div>
        </div>
        <div id="student-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-4">
            </div>
    </div>

    <div id="action-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-[28rem] relative transform transition-all">
            <button onclick="closeModal()" class="absolute top-3 right-4 text-gray-400 hover:text-red-500 text-3xl font-bold leading-none">&times;</button>
            
            <div class="text-center mb-6">
                <img id="modal-avatar" src="" alt="Avatar" class="w-20 h-20 mx-auto rounded-full bg-blue-100 mb-3 border-4 border-white shadow-sm">
                <h2 id="modal-name" class="text-2xl font-bold text-gray-800">學生姓名</h2>
                <p class="text-gray-500 mt-1">目前累積: <span id="modal-points" class="text-blue-600 font-black text-2xl">0</span> 點</p>
            </div>

            <div class="flex border-b mb-5 text-sm md:text-base">
                <button onclick="switchTab('add')" id="tab-add" class="flex-1 py-2 border-b-2 border-blue-500 text-blue-600 font-bold transition-colors">每日考勤</button>
                <button onclick="switchTab('redeem')" id="tab-redeem" class="flex-1 py-2 text-gray-400 font-bold hover:text-blue-500 transition-colors">兌換</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 text-gray-400 font-bold hover:text-blue-500 transition-colors">遲到紀錄</button>
                <button onclick="switchTab('redeem-history')" id="tab-redeem-history" class="flex-1 py-2 text-gray-400 font-bold hover:text-blue-500 transition-colors">兌換紀錄</button>
            </div>

            <div id="section-add" class="space-y-4">
                <div class="flex gap-3">
                    <button id="btn-punctual" onclick="quickAdd('punctual')" class="flex-1 bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 active:scale-95 transition-all shadow-sm flex flex-col items-center justify-center">
                        <span>🌅 準時</span>
                        <span id="label-punctual" class="text-sm font-normal opacity-90">+0 點</span>
                    </button>
                    <button id="btn-late" onclick="quickAdd('late')" class="flex-1 bg-red-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-red-600 active:scale-95 transition-all shadow-sm flex flex-col items-center justify-center">
                        <span>🏃 遲到</span>
                        <span id="label-late" class="text-sm font-normal opacity-90">-0 點</span>
                    </button>
                </div>
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-xs">手動特殊調整</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="number" id="custom-point-input" placeholder="手動輸入 (如: 50 或 -20)" class="flex-1 border-2 border-gray-200 p-2.5 rounded-xl focus:outline-none focus:border-blue-400 text-center font-bold text-sm">
                    <button onclick="submitCustomPoints()" class="bg-gray-700 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-gray-800 active:scale-95 transition-all text-sm">確認</button>
                </div>
            </div>

            <div id="section-redeem" class="hidden space-y-3">
                <p class="text-sm font-bold text-gray-700">1. 請選擇要兌換的項目：</p>
                <div class="h-48 overflow-y-auto border-2 border-gray-200 rounded-xl p-2 space-y-2 bg-gray-50">
                    
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="國語生字少一格" class="mr-3 w-5 h-5 accent-green-600" checked>
                        <span class="flex-1 font-bold text-gray-700 text-sm">1. 國語生字少一格</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="國語生字少兩個" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">2. 國語生字少兩個</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="國語語詞少一遍" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">3. 國語語詞少一遍</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="國語語詞少兩遍" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">4. 國語語詞少兩遍</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="免當值日生一次" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">5. 免當值日生一次</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="免午休一次" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">6. 免午休一次</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="免抬餐一次" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">7. 免抬餐一次</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="午休時間播放音樂" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">8. 午休時間播放音樂</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="兌換文具用品" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">9. 兌換文具用品</span>
                    </label>
                    <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-green-50 cursor-pointer transition-colors shadow-sm">
                        <input type="radio" name="reward" value="提早打菜+吃飯一次" class="mr-3 w-5 h-5 accent-green-600">
                        <span class="flex-1 font-bold text-gray-700 text-sm">10. 提早打菜+吃飯一次</span>
                    </label>

                </div>
                <div class="mt-3">
                    <p class="text-sm font-bold text-gray-700 mb-1">2. 請輸入本次要扣除的點數：<span class="text-red-500">*</span></p>
                    <input type="number" id="redeem-point-input" placeholder="例如：300" class="w-full border-2 border-gray-200 p-2.5 rounded-xl focus:outline-none focus:border-green-400 font-bold text-gray-700 text-center text-lg">
                </div>
                <button onclick="submitRedemption()" class="w-full mt-2 bg-green-500 text-white px-4 py-3 rounded-xl font-bold text-lg hover:bg-green-600 active:scale-95 transition-all shadow-sm">
                    確認兌換並扣點
                </button>
            </div>

            <div id="section-history" class="hidden">
                <div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto">
                    <ul id="late-history-list" class="space-y-2"></ul>
                </div>
            </div>

            <div id="section-redeem-history" class="hidden">
                <div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto">
                    <ul id="redeem-history-list" class="space-y-2"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dailyPointsMap = { 1: 100, 2: 200, 3: 300, 4: 400, 5: 500, 6: 100, 0: 100 };
        const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        let currentTodayPoints = 0; 

        function getFormattedTime() {
            const now = new Date();
            const dayOfWeek = dayNames[now.getDay()];
            const mm = (now.getMonth() + 1).toString().padStart(2, '0');
            const dd = now.getDate().toString().padStart(2, '0');
            const hh = now.getHours().toString().padStart(2, '0');
            const min = now.getMinutes().toString().padStart(2, '0');
            return `${now.getFullYear()}/${mm}/${dd} (${dayOfWeek}) ${hh}:${min}`;
        }

        function updateClock() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('clock-date').innerText = `${now.getFullYear()}年 ${now.getMonth() + 1}月 ${now.getDate()}日  ${dayNames[dayOfWeek]}`;
            currentTodayPoints = dailyPointsMap[dayOfWeek];
            document.getElementById('today-point-info').innerText = `✨ 今天是 ${dayNames[dayOfWeek]}，準時到校可獲得 ${currentTodayPoints} 點！`;
            document.getElementById('label-punctual').innerText = `+${currentTodayPoints} 點`;
            document.getElementById('label-late').innerText = `-${currentTodayPoints} 點`;
        }
        
        setInterval(updateClock, 1000);
        updateClock(); 

        // 雲端資料庫網址
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbx1mardakIchiA3CCZRvJq6FmEOMQ9uGIh3Y2DXTfr-smItfTjJLJFjGwHP7oh2pxMs/exec";

        // 這裡把預設名字改成只有號碼了！
        const defaultStudents = Array.from({ length: 27 }, (_, i) => ({
            id: i + 1, name: `${i + 1}號`, points: 0, lateDates: [], redeemHistory: [] 
        }));

        let students = []; 
        let currentSelectedStudentId = null;

        // 清理名稱的小工具：把「學生」兩個字自動砍掉
        function cleanStudentNames() {
            students.forEach(s => {
                if (s.name) {
                    s.name = s.name.replace(' 學生', '').replace('學生', '');
                }
            });
        }

        async function loadDataFromCloud() {
            const savedData = localStorage.getItem('classAppStudents');
            
            if (savedData) {
                students = JSON.parse(savedData);
                cleanStudentNames(); // 載入記憶時清理名字
                renderStudents();
                document.getElementById('today-point-info').innerText = "🔄 正在背景同步雲端最新資料...";
            } else {
                students = defaultStudents;
                renderStudents();
                document.getElementById('today-point-info').innerText = "⏳ 初次載入，正在連線 Google 雲端...";
            }

            try {
                const response = await fetch(GOOGLE_SHEET_API_URL);
                const data = await response.json();
                if (data && data.length > 0) {
                    students = data;
                    cleanStudentNames(); // 從雲端下載時再次清理名字
                    localStorage.setItem('classAppStudents', JSON.stringify(students));
                    saveDataToCloud(); // 把乾淨的名字蓋回雲端
                }
                renderStudents(); 
                updateClock(); 
            } catch (error) {
                console.log("背景連線失敗，目前顯示本機紀錄");
                updateClock(); 
            }
        }

        function saveDataToCloud() {
            localStorage.setItem('classAppStudents', JSON.stringify(students));
            fetch(GOOGLE_SHEET_API_URL, {
                method: "POST", body: JSON.stringify(students)
            }).catch(err => console.error("雲端儲存失敗", err));
        }

        function renderStudents() {
            const grid = document.getElementById('student-grid');
            grid.innerHTML = ''; 
            students.forEach(student => {
                const avatarUrl = `https://api.dicebear.com/7.x/bottts/svg?seed=student${student.id}`;
                if (!student.lateDates) student.lateDates = []; 
                if (!student.redeemHistory) student.redeemHistory = []; 
                const warningIcon = student.lateDates.length > 0 ? 
                    `<span class="absolute -top-1 -left-1 bg-red-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full shadow">${student.lateDates.length}</span>` : '';
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-2xl shadow-sm cursor-pointer transform transition duration-200 hover:-translate-y-1 hover:shadow-md flex flex-col items-center border border-gray-100 relative";
                card.onclick = () => openModal(student.id);
                card.innerHTML = `
                    ${warningIcon}
                    <div class="relative">
                        <img src="${avatarUrl}" class="w-14 h-14 rounded-full mb-2 bg-blue-50 border-2 border-blue-100">
                    </div>
                    <h3 class="font-bold text-gray-700 text-sm truncate w-full text-center">${student.name}</h3>
                    <div class="mt-2 bg-blue-50 text-blue-600 px-2 py-1 rounded-lg font-black text-base w-full text-center truncate">
                        ${student.points}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(studentId) {
            currentSelectedStudentId = studentId;
            const student = students.find(s => s.id === studentId);
            document.getElementById('modal-name').innerText = student.name;
            document.getElementById('modal-points').innerText = student.points;
            document.getElementById('modal-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=student${student.id}`;
            document.getElementById('custom-point-input').value = '';
            document.getElementById('redeem-point-input').value = ''; 
            const firstReward = document.querySelector('input[name="reward"]');
            if (firstReward) firstReward.checked = true;
            renderHistoryList(student);
            renderRedeemHistoryList(student);
            switchTab('add'); 
            document.getElementById('action-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('action-modal').classList.add('hidden');
            currentSelectedStudentId = null;
        }

        function switchTab(tab) {
            const sections = ['add', 'redeem', 'history', 'redeem-history'];
            sections.forEach(s => {
                const secEl = document.getElementById(`section-${s}`);
                const tabEl = document.getElementById(`tab-${s}`);
                if (s === tab) {
                    secEl.classList.remove('hidden');
                    tabEl.classList.add('border-b-2', 'border-blue-500', 'text-blue-600');
                    tabEl.classList.remove('text-gray-400');
                } else {
                    secEl.classList.add('hidden');
                    tabEl.classList.remove('border-b-2', 'border-blue-500', 'text-blue-600');
                    tabEl.classList.add('text-gray-400');
                }
            });
        }

        function renderHistoryList(student) {
            const listEl = document.getElementById('late-history-list');
            listEl.innerHTML = '';
            if (!student.lateDates || student.lateDates.length === 0) {
                listEl.innerHTML = `<li class="text-center text-green-600 font-bold py-6">✅ 目前沒有遲到紀錄！</li>`;
                return;
            }
            [...student.lateDates].reverse().forEach((dateStr) => {
                listEl.innerHTML += `<li class="flex items-center text-sm p-2 bg-white rounded border border-red-100 text-red-600"><span class="mr-2">🏃</span> ${dateStr}</li>`;
            });
        }

        function renderRedeemHistoryList(student) {
            const listEl = document.getElementById('redeem-history-list');
            listEl.innerHTML = '';
            if (!student.redeemHistory || student.redeemHistory.length === 0) {
                listEl.innerHTML = `<li class="text-center text-gray-400 font-bold py-6">目前還沒有兌換過獎勵喔！</li>`;
                return;
            }
            [...student.redeemHistory].reverse().forEach((recordStr) => {
                listEl.innerHTML += `<li class="flex items-start text-sm p-2 bg-white rounded border border-green-100 text-green-700 mb-1"><span class="mr-2 mt-0.5">🎁</span> <span>${recordStr}</span></li>`;
            });
        }

        function quickAdd(type) {
            const student = students.find(s => s.id === currentSelectedStudentId);
            let pointsToChange = 0;
            if (type === 'punctual') {
                pointsToChange = currentTodayPoints; 
            } else if (type === 'late') {
                if(!confirm(`確定要登記 ${student.name}「遲到」，並扣除 ${currentTodayPoints} 點嗎？`)) return; 
                pointsToChange = -currentTodayPoints; 
                if (!student.lateDates) student.lateDates = [];
                student.lateDates.push(getFormattedTime());
            }
            updateStudentPoints(currentSelectedStudentId, pointsToChange);
            closeModal();
        }

        function submitCustomPoints() {
            const pointsToAdd = parseInt(document.getElementById('custom-point-input').value);
            if (isNaN(pointsToAdd)) { alert("請輸入有效的數字！"); return; }
            updateStudentPoints(currentSelectedStudentId, pointsToAdd);
            closeModal();
        }

        function submitRedemption() {
            const selectedRadio = document.querySelector('input[name="reward"]:checked');
            if (!selectedRadio) { alert("請先選擇一個兌換項目！"); return; }
            const cost = parseInt(document.getElementById('redeem-point-input').value);
            if (isNaN(cost) || cost <= 0) { alert("請輸入要扣除的點數！"); return; }
            
            const student = students.find(s => s.id === currentSelectedStudentId);
            if (student.points < cost) {
                alert(`點數不足。還差 ${cost - student.points} 點喔！`); return;
            }

            if (confirm(`確定花費 ${cost} 點兌換「${selectedRadio.value}」嗎？`)) {
                if (!student.redeemHistory) student.redeemHistory = [];
                student.redeemHistory.push(`${getFormattedTime()}<br><b>${selectedRadio.value} (-${cost}點)</b>`);
                updateStudentPoints(currentSelectedStudentId, -cost); 
                alert("🎉 兌換成功！");
                closeModal();
            }
        }

        function updateStudentPoints(studentId, pointsToChange) {
            const studentIndex = students.findIndex(s => s.id === studentId);
            if (studentIndex !== -1) {
                students[studentIndex].points += pointsToChange;
                renderStudents();  
                saveDataToCloud(); 
            }
        }

        window.onload = loadDataFromCloud;
    </script>
</body>
</html>
