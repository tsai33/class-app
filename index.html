<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級專屬入口網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-orange-50 p-4 md:p-8 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl shadow-lg p-4 md:p-6 mb-8 flex flex-col md:flex-row justify-between items-center border-l-8 border-orange-400 gap-4">
            <div class="text-center md:text-left w-full md:w-auto">
                <h1 class="text-2xl md:text-3xl font-black text-orange-700 mb-1">🍉 班級大作戰</h1>
                <p class="text-sm md:text-base text-gray-600 font-medium" id="today-point-info">讀取中...</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 md:gap-3 w-full md:w-auto justify-center md:justify-end">
                
                <button onclick="openCountdownSettings()" class="flex-1 md:flex-none bg-rose-100 text-rose-700 font-bold px-3 py-2 rounded-xl hover:bg-rose-200 active:scale-95 transition-all shadow-sm flex flex-col items-center justify-center min-w-[100px]">
                    <span id="display-event-name" class="text-xs md:text-sm opacity-80">距離 目標</span>
                    <div class="flex items-baseline gap-1">
                        <span id="display-countdown-days" class="text-lg md:text-xl font-black">--</span>
                        <span class="text-xs md:text-sm">天</span>
                    </div>
                </button>

                <button onclick="openInfoModal('announcement')" class="flex-1 md:flex-none bg-blue-100 text-blue-700 font-bold px-3 py-3 rounded-xl hover:bg-blue-200 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-1">
                    <span class="text-lg md:text-xl">📢</span> <span class="text-sm md:text-base">公告</span>
                </button>
                <button onclick="openInfoModal('homework')" class="flex-1 md:flex-none bg-green-100 text-green-700 font-bold px-3 py-3 rounded-xl hover:bg-green-200 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-1">
                    <span class="text-lg md:text-xl">📖</span> <span class="text-sm md:text-base">聯絡簿</span>
                </button>
                <button onclick="openInfoModal('tracking')" class="flex-1 md:flex-none bg-purple-100 text-purple-700 font-bold px-3 py-3 rounded-xl hover:bg-purple-200 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-1">
                    <span class="text-lg md:text-xl">✅</span> <span class="text-sm md:text-base">作業追蹤</span>
                </button>
                <button id="btn-random-draw" onclick="randomDraw()" class="w-full md:w-auto bg-yellow-400 text-yellow-950 font-extrabold px-4 py-3 rounded-xl hover:bg-yellow-500 active:scale-95 transition-all shadow-md flex items-center justify-center gap-1">
                    <span class="text-xl">🎲</span> <span>抽籤</span>
                </button>
            </div>
        </div>

        <div id="student-grid" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-4 md:gap-5">
            </div>
    </div>

    <div id="info-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-40 p-2 md:p-4">
        <div class="bg-white p-4 md:p-6 rounded-3xl shadow-2xl w-full max-w-[95vw] xl:max-w-[90vw] relative transform transition-all border border-gray-100 max-h-[95vh] flex flex-col">
            <button onclick="closeInfoModal()" class="absolute top-2 right-4 text-gray-400 hover:text-red-500 text-4xl font-light z-40">&times;</button>
            
            <div id="info-content-announcement" class="hidden flex-1 overflow-y-auto hide-scrollbar mt-2 max-w-5xl mx-auto w-full">
                <div class="flex justify-between items-center mb-4 pr-8">
                    <h2 class="text-2xl font-black text-blue-700 flex items-center gap-2">📢 班級公告</h2>
                    <div class="flex gap-2">
                        <button onclick="openEnlargeModal('announcement')" class="text-sm bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-100 font-bold transition-colors border border-blue-100 flex items-center gap-1">🔍 <span class="hidden md:inline">放大</span></button>
                        <button onclick="toggleEditAnnouncement()" id="btn-edit-announcement" class="text-sm bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200 font-bold transition-colors">✏️ 編輯</button>
                    </div>
                </div>
                <div id="announcement-display" class="bg-blue-50 p-5 md:p-8 rounded-2xl border border-blue-100 whitespace-pre-wrap text-gray-800 leading-relaxed font-medium text-lg md:text-xl lg:text-2xl min-h-[150px]"></div>
                <textarea id="announcement-editor" class="hidden w-full h-48 border-2 border-blue-200 rounded-xl p-4 text-lg focus:outline-none focus:border-blue-400 mb-3 bg-white" placeholder="請輸入班級公告..."></textarea>
                <button id="btn-save-announcement" onclick="saveAnnouncement()" class="hidden bg-blue-600 text-white px-4 py-3 rounded-xl font-bold w-full hover:bg-blue-700 transition-colors shadow-md text-lg">💾 儲存公告</button>
            </div>

            <div id="info-content-homework" class="hidden flex-1 overflow-y-auto hide-scrollbar flex-col mt-2 max-w-5xl mx-auto w-full">
                <div class="flex justify-between items-center mb-4 pr-8">
                    <h2 class="text-2xl font-black text-green-700 flex items-center gap-2">📖 聯絡簿紀錄</h2>
                    <button onclick="showAddContactBook()" class="text-sm bg-green-100 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-200 font-bold transition-colors shadow-sm">➕ 新增紀錄</button>
                </div>
                
                <div id="contact-book-editor" class="hidden mb-5 bg-green-50 p-4 rounded-xl border-2 border-green-200 shadow-inner">
                    <div class="font-bold text-green-800 mb-2 flex items-center gap-2">
                        <span class="text-lg">🗓️ 日期：</span>
                        <input type="date" id="contact-book-date-input" class="border-2 border-green-200 rounded-lg p-1.5 focus:outline-none focus:border-green-400 bg-white text-green-900 cursor-pointer shadow-sm text-base font-bold">
                    </div>
                    <textarea id="contact-book-textarea" placeholder="國語：甲本 P.1~P.3&#10;數學：習作 P.5&#10;(每一行都會自動變成作業追蹤項目喔！)" class="w-full h-40 border border-green-200 rounded-lg p-4 mt-2 mb-4 focus:outline-none focus:border-green-400 bg-white leading-relaxed text-lg"></textarea>
                    <div class="flex gap-2">
                        <button onclick="saveContactBook()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow-sm text-lg">發布</button>
                        <button onclick="hideAddContactBook()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-400 text-lg">取消</button>
                    </div>
                </div>

                <div id="contact-book-list" class="space-y-4 pb-4"></div>
            </div>

            <div id="info-content-tracking" class="hidden flex-col h-full mt-2 w-full">
                <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-4 gap-3 pr-8 shrink-0">
                    <h2 class="text-2xl font-black text-purple-700 flex items-center gap-2">✅ 作業追蹤</h2>
                    <select id="tracking-date-select" onchange="renderTracking()" class="w-full md:w-64 border-2 border-purple-200 bg-purple-50 text-purple-800 rounded-xl p-2 font-bold focus:outline-none focus:border-purple-400 cursor-pointer text-base md:text-lg"></select>
                </div>

                <div id="tracking-tables-container" class="flex-1 overflow-y-auto overflow-x-hidden hide-scrollbar pb-6">
                    </div>
            </div>
        </div>
    </div>

    <div id="enlarge-modal" class="fixed inset-0 z-50 hidden flex-col transition-colors duration-300">
        <div id="enlarge-header" class="flex justify-between items-center p-4 md:p-6 text-white shadow-lg">
            <h2 id="enlarge-title" class="text-4xl md:text-6xl lg:text-7xl font-black tracking-wider drop-shadow-md">標題</h2>
            <button onclick="closeEnlargeModal()" class="text-white hover:opacity-75 text-5xl md:text-7xl font-light leading-none px-4">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 md:p-12 lg:p-16 flex justify-center items-start">
            <div id="enlarge-box" class="w-full max-w-[95%] lg:max-w-6xl bg-white p-8 md:p-16 lg:p-20 rounded-[2rem] shadow-2xl border-4 mt-2 md:mt-8">
                <div id="enlarge-content" class="text-5xl md:text-7xl lg:text-[80px] text-gray-900 whitespace-pre-wrap leading-snug md:leading-tight font-black tracking-wide"></div>
            </div>
        </div>
    </div>

    <div id="countdown-setting-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-5 md:p-7 rounded-3xl shadow-2xl w-full max-w-sm relative transform transition-all border border-gray-100 flex flex-col">
            <button onclick="closeCountdownSettings()" class="absolute top-2 right-4 text-gray-400 hover:text-red-500 text-4xl font-light z-10">&times;</button>
            <h2 class="text-2xl font-black text-rose-700 mb-5 flex items-center gap-2">⏳ 倒數設定</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-1 text-sm">目標名稱 (例如：畢業、期末考)</label>
                    <input type="text" id="input-event-name" placeholder="請輸入目標名稱" class="w-full border-2 border-rose-200 rounded-xl p-2.5 focus:outline-none focus:border-rose-400 font-bold bg-rose-50 text-rose-900">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1 text-sm">目標日期</label>
                    <input type="date" id="input-event-date" class="w-full border-2 border-rose-200 rounded-xl p-2.5 focus:outline-none focus:border-rose-400 font-bold bg-rose-50 text-rose-900 cursor-pointer">
                </div>
                <button onclick="saveCountdownSettings()" class="w-full bg-rose-500 text-white px-4 py-3 rounded-xl font-bold shadow-sm hover:bg-rose-600 mt-2 text-lg transition-colors">💾 儲存設定</button>
            </div>
        </div>
    </div>

    <div id="action-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-40 p-4">
        <div class="bg-white p-5 md:p-7 rounded-3xl shadow-2xl w-full max-w-md relative transform transition-all border border-gray-100 flex flex-col max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-2 right-4 text-gray-400 hover:text-red-500 text-5xl font-light leading-none z-10">&times;</button>
            <div class="text-center mb-5 shrink-0">
                <div id="modal-avatar" class="w-20 h-20 md:w-24 md:h-24 mx-auto rounded-full bg-orange-50 mb-2 border-4 border-white shadow-md flex items-center justify-center text-5xl md:text-6xl select-none">🍎</div>
                <h2 id="modal-name" class="text-xl md:text-2xl font-bold text-gray-800">學生姓名</h2>
                <p class="text-gray-500 text-sm md:text-base mt-1">累積: <span id="modal-points" class="text-orange-600 font-black text-xl md:text-2xl">0</span> 點</p>
            </div>
            
            <div class="flex border-b mb-4 text-xs md:text-sm overflow-x-auto whitespace-nowrap hide-scrollbar border-gray-200 shrink-0">
                <button onclick="switchTab('add')" id="tab-add" class="px-2 py-2 border-b-2 border-orange-500 text-orange-600 font-bold transition-colors">加扣點</button>
                <button onclick="switchTab('redeem')" id="tab-redeem" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">兌換獎勵</button>
                <button onclick="switchTab('point-history')" id="tab-point-history" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">加扣紀錄</button>
                <button onclick="switchTab('history')" id="tab-history" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">遲到紀錄</button>
                <button onclick="switchTab('redeem-history')" id="tab-redeem-history" class="px-2 py-2 text-gray-500 font-bold hover:text-orange-600 transition-colors">兌換紀錄</button>
            </div>

            <div class="flex-1 overflow-y-auto hide-scrollbar pb-2">
                <div id="section-add" class="space-y-4">
                    <div class="flex gap-2 md:gap-3">
                        <button id="btn-punctual" onclick="quickAdd('punctual')" class="flex-1 bg-green-500 text-white py-3 md:py-4 rounded-xl font-bold md:text-lg hover:bg-green-600 active:scale-95 transition-all shadow-md flex flex-col items-center justify-center"><span>🌅 準時加點</span><span id="label-punctual" class="text-xs font-normal opacity-90">+0 點</span></button>
                        <button id="btn-late" onclick="quickAdd('late')" class="flex-1 bg-red-500 text-white py-3 md:py-4 rounded-xl font-bold md:text-lg hover:bg-red-600 active:scale-95 transition-all shadow-md flex flex-col items-center justify-center"><span>🏃 登記遲到</span><span id="label-late" class="text-xs font-normal opacity-90">-0 點</span></button>
                    </div>
                    <div class="relative flex items-center py-1"><div class="flex-grow border-t border-gray-200"></div><span class="flex-shrink-0 mx-4 text-gray-400 text-xs">手動特殊調整</span><div class="flex-grow border-t border-gray-200"></div></div>
                    <div class="flex items-center gap-2">
                        <input type="number" id="custom-point-input" placeholder="正數加點，負數扣點" class="flex-1 border-2 border-gray-200 p-2.5 rounded-xl focus:outline-none focus:border-orange-400 text-center font-bold text-sm md:text-base bg-gray-50 shadow-inner">
                        <button onclick="submitCustomPoints()" class="bg-gray-800 text-white px-4 py-2.5 rounded-xl font-bold hover:bg-gray-900 active:scale-95 transition-all text-sm shadow-sm">確認</button>
                    </div>
                </div>

                <div id="section-redeem" class="hidden space-y-3">
                    <div class="h-48 overflow-y-auto border-2 border-gray-200 rounded-xl p-2 space-y-2 bg-gray-50 hide-scrollbar">
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="1. 國語生字少一格" data-cost="100" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">1. 國語生字少一格 <span class="text-orange-500 font-black">(100點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="2. 國語生字少兩格" data-cost="200" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">2. 國語生字少兩個 <span class="text-orange-500 font-black">(200點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="3. 國語語詞少一遍" data-cost="150" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">3. 國語語詞少一遍 <span class="text-orange-500 font-black">(150點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="4. 國語語詞少兩遍" data-cost="300" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">4. 國語語詞少兩遍 <span class="text-orange-500 font-black">(300點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="5. 免當值日生一次" data-cost="150" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">5. 免當值日生一次 <span class="text-orange-500 font-black">(150點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="6. 免午休一次" data-cost="200" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">6. 免午休一次 <span class="text-orange-500 font-black">(200點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="7. 免抬餐一次" data-cost="250" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">7. 免抬餐一次 <span class="text-orange-500 font-black">(250點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="8. 午休時間播放音樂" data-cost="150" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">8. 午休時間播放音樂 <span class="text-orange-500 font-black">(150點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="9. 兌換文具用品" data-cost="400" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">9. 兌換文具用品 <span class="text-orange-500 font-black">(400點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="10. 提早打菜+吃飯一次" data-cost="250" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">10. 提早打菜+吃飯一次 <span class="text-orange-500 font-black">(250點)</span></span></label>
                        <label class="flex items-center p-3 bg-white border rounded-lg hover:bg-orange-50 cursor-pointer shadow-sm"><input type="radio" name="reward" value="11. 圈詞少一遍" data-cost="300" onchange="autoFillPoints(this)" class="mr-3 w-5 h-5 accent-orange-500"><span class="flex-1 font-bold text-gray-700 text-sm">11. 圈詞少一遍 <span class="text-orange-500 font-black">(300點)</span></span></label>

                    </div>
                    <div class="mt-2 flex gap-2">
                        <input type="number" id="redeem-point-input" placeholder="扣除點數" class="flex-1 border-2 border-gray-200 p-2 rounded-xl focus:outline-none focus:border-green-400 font-bold text-center bg-gray-50 shadow-inner text-green-700">
                        <button onclick="submitRedemption()" class="bg-green-500 text-white px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-green-600">兌換</button>
                    </div>
                </div>
                <div id="section-point-history" class="hidden"><div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto hide-scrollbar shadow-inner"><ul id="point-history-list" class="space-y-2"></ul></div></div>
                <div id="section-history" class="hidden"><div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto hide-scrollbar shadow-inner"><ul id="late-history-list" class="space-y-2"></ul></div></div>
                <div id="section-redeem-history" class="hidden"><div class="bg-gray-50 border rounded-xl p-3 h-48 overflow-y-auto hide-scrollbar shadow-inner"><ul id="redeem-history-list" class="space-y-2"></ul></div></div>
            </div>
        </div>
    </div>

    <script>
        const dailyPointsMap = { 1: 100, 2: 200, 3: 300, 4: 400, 5: 500, 6: 100, 0: 100 };
        const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        let currentTodayPoints = 0; 
        const fruits = ['🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🍇', '🍈', '🍒', '🍑', '🥭', '🍍', '🥥', '🥝', '🍅', '🥑', '🍏', '🍇', '🍊', '🍋', '🍉', '🍓', '🍑', '🍍', '🍒', '🥭', '🫐', '🥥'];

        const HW_STATUSES = ['缺交', '已交', '訂正', '完成'];
        const HW_COLORS = {
            '缺交': 'bg-red-100 text-red-700 border-red-300',
            '已交': 'bg-green-100 text-green-700 border-green-300',
            '訂正': 'bg-yellow-100 text-yellow-700 border-yellow-300',
            '完成': 'bg-blue-100 text-blue-700 border-blue-300'
        };

        let appAnnouncement = localStorage.getItem('classAppAnnouncement') || "🌟 歡迎來到班級專屬入口網！";
        let appContactBook = JSON.parse(localStorage.getItem('classAppContactBook')) || [];
        
        let currentTrackingDate = '';
        let currentTrackingTasks = [];

        function getFruitEmoji(id) { return fruits[(id - 1) % fruits.length]; }
        function getFormattedTime() { const now = new Date(); return `${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`; }

        function updateClock() {
            const now = new Date(); const dayOfWeek = now.getDay();
            currentTodayPoints = dailyPointsMap[dayOfWeek];
            document.getElementById('today-point-info').innerText = `✨ 今天準時可獲得 ${currentTodayPoints} 點！`;
            if(document.getElementById('label-punctual')) document.getElementById('label-punctual').innerText = `+${currentTodayPoints} 點`;
            if(document.getElementById('label-late')) document.getElementById('label-late').innerText = `-${currentTodayPoints} 點`;
        }
        setInterval(updateClock, 1000); updateClock(); 

        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbx1mardakIchiA3CCZRvJq6FmEOMQ9uGIh3Y2DXTfr-smItfTjJLJFjGwHP7oh2pxMs/exec";
        let students = Array.from({ length: 27 }, (_, i) => ({ id: i + 1, name: `${i + 1}號`, points: 0, lateDates: [], redeemHistory: [], pointHistory: [], homework: {} }));
        let currentSelectedStudentId = null;

        function cleanStudentNames() {
            students.forEach(s => {
                if (s.name) s.name = s.name.replace(' 學生', '').replace('學生', '');
                if (!s.pointHistory) s.pointHistory = [];
                if (!s.lateDates) s.lateDates = [];
                if (!s.redeemHistory) s.redeemHistory = [];
                if (!s.homework) s.homework = {}; 
            });
        }

        async function loadDataFromCloud() {
            const savedData = localStorage.getItem('classAppStudents');
            if (savedData) { students = JSON.parse(savedData); cleanStudentNames(); renderStudents(); }
            renderAnnouncement(); renderContactBookList(); 
            try {
                const response = await fetch(GOOGLE_SHEET_API_URL);
                const data = await response.json();
                if (data && data.length > 0) {
                    students = data; cleanStudentNames();
                    localStorage.setItem('classAppStudents', JSON.stringify(students)); saveDataToCloud(); 
                }
                renderStudents(); 
            } catch (error) { console.log("雲端連線失敗"); }
        }

        function saveDataToCloud() {
            localStorage.setItem('classAppStudents', JSON.stringify(students));
            fetch(GOOGLE_SHEET_API_URL, { method: "POST", body: JSON.stringify(students) }).catch(err => console.error(err));
        }

            const grid = document.getElementById('student-grid'); grid.innerHTML = '';

                card.onclick = () => openModal(student.id);

        function randomDraw() {
            if (students.length === 0) return;
            const btn = document.getElementById('btn-random-draw'); btn.disabled = true; btn.innerHTML = `<span class="text-xl">🎲</span> <span>抽籤中...</span>`;
            let times = 0; const maxTimes = 15; 
            const interval = setInterval(() => {
                students.forEach(s => document.getElementById(`student-card-${s.id}`)?.classList.remove('ring-4', 'ring-yellow-400', 'scale-110', 'z-20', 'shadow-xl'));
                const rStudent = students[Math.floor(Math.random() * students.length)];
                document.getElementById(`student-card-${rStudent.id}`)?.classList.add('ring-4', 'ring-yellow-400', 'scale-110', 'z-20', 'shadow-xl');
                times++;
                if (times >= maxTimes) {
                    clearInterval(interval); btn.disabled = false; btn.innerHTML = `<span class="text-xl">🎲</span> <span>抽籤</span>`;
                    setTimeout(() => { students.forEach(s => document.getElementById(`student-card-${s.id}`)?.classList.remove('ring-4', 'ring-yellow-400', 'scale-110', 'z-20', 'shadow-xl')); openModal(rStudent.id); }, 500); 
                }
            }, 100); 
        }

        function showAddContactBook() {
            document.getElementById('contact-book-editor').classList.remove('hidden');
            
            const today = new Date();

        function saveContactBook() {
            const content = document.getElementById('contact-book-textarea').value.trim();
            const dateVal = document.getElementById('contact-book-date-input').value;
            
            if(!dateVal) { alert("請選擇日期！"); return; }
            if(!content) { alert("聯絡簿內容不能為空喔！"); return; }
            
            const selectedDate = new Date(dateVal);
            const formattedDate = `${selectedDate.getFullYear()}/${(selectedDate.getMonth()+1).toString().padStart(2,'0')}/${selectedDate.getDate().toString().padStart(2,'0')} (${dayNames[selectedDate.getDay()]})`;

            appContactBook.unshift({ date: formattedDate, content: content });
            
            // ⭐️ 自動排序：依據日期由新到舊排列

        // ==========================================
        // ✅ 作業追蹤系統 
        // ==========================================
        function populateTrackingDates() {
            const select = document.getElementById('tracking-date-select');
            select.innerHTML = '';
            if (appContactBook.length === 0) {
                select.innerHTML = '<option value="">(無聯絡簿紀錄)</option>'; return;

            appContactBook.forEach((entry, i) => {
                const opt = document.createElement('option');
                opt.value = i; opt.text = `🗓️ ${entry.date}`; select.appendChild(opt);
            });

        function renderTracking() {
            const select = document.getElementById('tracking-date-select');
            const container = document.getElementById('tracking-tables-container');

            if (appContactBook.length === 0 || !select.value) {
                container.innerHTML = '<div class="text-center text-gray-400 py-10 font-bold bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 text-lg">請先於「聯絡簿」新增內容，系統將自動產生追蹤表格！</div>';
                return;
            }

            const entry = appContactBook[select.value];
            currentTrackingDate = entry.date;
            currentTrackingTasks = entry.content.split('\n').map(t => t.trim()).filter(t => t !== '');

            if (currentTrackingTasks.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-10 font-bold bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 text-lg">該日聯絡簿無文字內容可追蹤！</div>';
                return;
            }

            const numColumns = 3; 
            const chunkSize = Math.ceil(students.length / numColumns);
            
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 items-start pb-2">`;

            for (let c = 0; c < numColumns; c++) {
                const chunk = students.slice(c * chunkSize, (c + 1) * chunkSize);
                if (chunk.length === 0) continue;

                html += `
                <div class="bg-white rounded-2xl border-2 border-purple-200 shadow-sm overflow-hidden flex flex-col relative isolate">
                    <div class="overflow-x-auto hide-scrollbar">
                        <table class="w-full text-center border-collapse whitespace-nowrap text-sm">
                            <thead class="bg-purple-50 text-gray-800">
                                <tr>
                                    <th class="sticky left-0 z-20 bg-purple-100 border-b-2 border-r border-purple-200 p-2 md:p-3 min-w-[50px] md:min-w-[60px]">號碼</th>
                `;

                currentTrackingTasks.forEach((task, i) => {
                    html += `
                                    <th class="border-b-2 border-purple-200 p-2 md:p-3 min-w-[100px] md:min-w-[110px]">
                                        <div class="truncate max-w-[120px] mx-auto font-black text-purple-900" title="${task}">${task}</div>
                                        <button onclick="batchSetTracking(${i}, '已交')" class="mt-1.5 text-xs bg-purple-600 text-white hover:bg-purple-700 px-2 py-1.5 rounded-lg transition-colors w-full font-bold shadow-sm">
                                            ⚡ 全班已交
                                        </button>
                                    </th>
                    `;
                });

                html += `       </tr>
                            </thead>
                            <tbody class="bg-white [&>tr:last-child>td]:border-b-0">
                `;

                chunk.forEach((student) => {
                    if (!student.homework) student.homework = {};
                    if (!student.homework[currentTrackingDate]) student.homework[currentTrackingDate] = {};

                    html += `
                                <tr class="hover:bg-orange-50 transition-colors">
                                    <td class="sticky left-0 z-10 bg-white border-r border-b border-gray-200 p-2 md:p-3 font-black text-gray-900 shadow-[1px_0_0_0_#e5e7eb]">
                                        ${student.id}
                                    </td>
                    `;

                    currentTrackingTasks.forEach((task, i) => {
                        const status = student.homework[currentTrackingDate][task] || '缺交';
                        const colorClass = HW_COLORS[status];
                        html += `
                                    <td class="p-1.5 md:p-2 border-b border-gray-200">
                                        <button onclick="cycleTrackingStatus(${student.id}, ${i}, this)" 
                                            class="w-full py-1.5 md:py-2 px-1 rounded-lg text-xs md:text-sm font-black border transition-colors select-none active:scale-95 shadow-sm ${colorClass}">
                                            ${status}
                                        </button>
                                    </td>
                        `;
                    });
                    html += `   </tr>`;
                });

                html += `       </tbody>
                        </table>
                    </div>
                </div>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        function cycleTrackingStatus(studentId, taskIndex, btnElement) {
            const task = currentTrackingTasks[taskIndex];
            const student = students.find(s => s.id === studentId);
            let currentStatus = student.homework[currentTrackingDate][task] || '缺交';
            
            let nextIndex = (HW_STATUSES.indexOf(currentStatus) + 1) % HW_STATUSES.length;
            let newStatus = HW_STATUSES[nextIndex];
            
            student.homework[currentTrackingDate][task] = newStatus;
            saveDataToCloud();
            
            const colorClass = HW_COLORS[newStatus];
            btnElement.className = `w-full py-1.5 md:py-2 px-1 rounded-lg text-xs md:text-sm font-black border transition-colors select-none active:scale-95 shadow-sm ${colorClass}`;
            btnElement.innerText = newStatus;
        }

        function batchSetTracking(taskIndex, targetStatus) {
            const task = currentTrackingTasks[taskIndex];
            if(!confirm(`確定要將【全班】的「${task.substring(0,8)}...」都設為「${targetStatus}」嗎？`)) return;
            
            students.forEach(student => {
                if (!student.homework) student.homework = {};
                if (!student.homework[currentTrackingDate]) student.homework[currentTrackingDate] = {};
                student.homework[currentTrackingDate][task] = targetStatus;
            });
            saveDataToCloud();
            renderTracking();
        }

        function renderPointHistoryList(student) {
            const listEl = document.getElementById('point-history-list'); listEl.innerHTML = '';

            [...student.pointHistory].reverse().forEach((recordStr) => {

                const colorClass = isAdd ? 'text-green-700 border-green-200 bg-green-50' : 'text-red-700 border-red-200 bg-red-50';
                listEl.innerHTML += `<li class="flex items-start text-xs md:text-sm p-2 rounded border ${colorClass} mb-1"><span class="mr-2 mt-0.5">${icon}</span> <span>${recordStr}</span></li>`;
            });
        }

        function renderHistoryList(student) {
            const listEl = document.getElementById('late-history-list'); listEl.innerHTML = '';
            if (!student.lateDates || student.lateDates.length === 0) { listEl.innerHTML = `<li class="text-center text-green-600 font-bold py-6">✅ 目前沒有遲到紀錄！</li>`; return; }
            const reversedDates = [...student.lateDates].reverse();
            reversedDates.forEach((dateStr, index) => {
                const originalIndex = student.lateDates.length - 1 - index;
                listEl.innerHTML += `<li class="flex items-center justify-between text-xs md:text-sm p-2 bg-white rounded border border-red-100 text-red-700 mb-1"><div class="flex items-center"><span class="mr-2">🏃</span> ${dateStr}</div><button onclick="deleteLateRecord(${originalIndex})" class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold hover:bg-red-200">消除</button></li>`;

        function deleteLateRecord(index) {
            if(confirm("確定消除這筆遲到紀錄嗎？")) { const student = students.find(s => s.id === currentSelectedStudentId); student.lateDates.splice(index, 1); renderHistoryList(student); renderStudents(); saveDataToCloud(); }
        }

        function renderRedeemHistoryList(student) {
            const listEl = document.getElementById('redeem-history-list'); listEl.innerHTML = '';
            if (!student.redeemHistory || student.redeemHistory.length === 0) { listEl.innerHTML = `<li class="text-center text-gray-400 font-bold py-6">目前還沒有兌換過獎勵喔！</li>`; return; }
            [...student.redeemHistory].reverse().forEach((recordStr) => { listEl.innerHTML += `<li class="flex items-start text-xs md:text-sm p-2 bg-white rounded border border-blue-100 text-blue-800 mb-1"><span class="mr-2 mt-0.5">🎁</span> <span>${recordStr}</span></li>`; });

        function quickAdd(type) {
            const student = students.find(s => s.id === currentSelectedStudentId); let pointsToChange = 0;
            if (type === 'punctual') { pointsToChange = currentTodayPoints; student.pointHistory.push(`[${getFormattedTime()}] 準時到校 (+${currentTodayPoints}點)`); } 
            else if (type === 'late') { if(!confirm(`確定要登記遲到並扣除 ${currentTodayPoints} 點嗎？`)) return; pointsToChange = -currentTodayPoints; student.lateDates.push(`[${getFormattedTime()}] 遲到登記`); student.pointHistory.push(`[${getFormattedTime()}] 遲到扣除 (-${currentTodayPoints}點)`); }
            updateStudentPoints(currentSelectedStudentId, pointsToChange); closeModal();
        }

        function submitCustomPoints() {
            const pts = parseInt(document.getElementById('custom-point-input').value); if (isNaN(pts)) { alert("請輸入有效的數字！"); return; }
            const student = students.find(s => s.id === currentSelectedStudentId); student.pointHistory.push(`[${getFormattedTime()}] 手動調整 (${pts >= 0 ? '+' : ''}${pts}點)`);
            updateStudentPoints(currentSelectedStudentId, pts); closeModal();
        }

        function submitRedemption() {
            const selected = document.querySelector('input[name="reward"]:checked'); if (!selected) { alert("請先選擇兌換項目！"); return; }
            const cost = parseInt(document.getElementById('redeem-point-input').value); if (isNaN(cost) || cost <= 0) { alert("請輸入扣除點數！"); return; }
            const student = students.find(s => s.id === currentSelectedStudentId); if (student.points < cost) { alert(`點數不足！還差 ${cost - student.points} 點。`); return; }
            if (confirm(`確定花 ${cost} 點兌換「${selected.value}」嗎？`)) {
                const timeStr = getFormattedTime(); student.redeemHistory.push(`[${timeStr}] 兌換 <b>${selected.value}</b>`); student.pointHistory.push(`[${timeStr}] 兌換獎勵 (-${cost}點)`);
                updateStudentPoints(currentSelectedStudentId, -cost); alert("🎉 兌換成功！"); closeModal();
            }
        }

        function updateStudentPoints(studentId, pointsToChange) { const index = students.findIndex(s => s.id === studentId); if (index !== -1) { students[index].points += pointsToChange; renderStudents(); saveDataToCloud(); } }

        // ==========================================
        // ⏳ 倒數計時器邏輯
        // ==========================================
        let countdownData = JSON.parse(localStorage.getItem('classAppCountdown')) || { name: '目標', date: '' };

        function updateCountdownDisplay() {
            const nameEl = document.getElementById('display-event-name');
            const daysEl = document.getElementById('display-countdown-days');
            
            if (!countdownData.date) {
                nameEl.innerText = '點擊設定倒數';
                daysEl.innerText = '--';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            const targetDate = new Date(countdownData.date);
            targetDate.setHours(0, 0, 0, 0);

            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > 0) {
                nameEl.innerText = `距離 ${countdownData.name}`;
                daysEl.innerText = diffDays;
            } else if (diffDays === 0) {
                nameEl.innerText = `就是今天！`;
                daysEl.innerText = '0';
            } else {
                nameEl.innerText = `${countdownData.name}已過`;
                daysEl.innerText = Math.abs(diffDays);
            }
        }

        function openCountdownSettings() {
            document.getElementById('input-event-name').value = countdownData.name !== '目標' ? countdownData.name : '';
            document.getElementById('input-event-date').value = countdownData.date;
            document.getElementById('countdown-setting-modal').classList.remove('hidden');
        }

        function closeCountdownSettings() {
            document.getElementById('countdown-setting-modal').classList.add('hidden');
        }

        function saveCountdownSettings() {
            const name = document.getElementById('input-event-name').value.trim();
            const date = document.getElementById('input-event-date').value;
            
            if (!name || !date) {
                alert('名稱與日期都不能為空喔！');
                return;
            }

            countdownData = { name, date };
            localStorage.setItem('classAppCountdown', JSON.stringify(countdownData));
            updateCountdownDisplay();
            closeCountdownSettings();
        }

        // 初始載入
        window.onload = () => {
            loadDataFromCloud();
            updateCountdownDisplay();
        };
    </script>
</body>
</html>
